<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>灵性祭坛 · 极简版</title>

<style>
/* =========================
   Apple + MUJI 极简风
   ========================= */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F6F2EA;          /* 暖白纸感 */
  --paper:#FBF8F2;       /* 卡片底 */
  --card:#F2EEE6;        /* 输入/浅底 */
  --ink:#1B1A17;         /* 主文字 */
  --muted:#7B746A;       /* 次文字 */
  --line:rgba(27,26,23,.10);

  --accent:#C8A86A;      /* 暖黄点缀（克制使用） */
  --accent2:#B79B62;

  --r:12px;              /* 更小圆角 */
  --rl:16px;

  --navH:72px;
}
body.dark{
  --bg:#12110E;
  --paper:#171612;
  --card:#1C1B16;
  --ink:#F2EFE8;
  --muted:#A09A8F;
  --line:rgba(242,239,232,.10);
}
html,body{height:100%}
body{
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
               "SF Pro Display","SF Pro Text","PingFang SC","Hiragino Sans GB",
               "Noto Sans CJK SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* APP */
#app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* 屏幕区域：给底部固定导航预留空间 */
.scr{
  display:none;
  flex:1;
  overflow:auto;
  padding-bottom:calc(var(--navH) + 18px);
  -webkit-overflow-scrolling:touch;
}
.scr.on{display:flex;flex-direction:column;animation:scrIn .25s ease}
@keyframes scrIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 顶部 header */
.sh{
  padding:18px 18px 8px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}
.sh h1{font-size:1.15rem;font-weight:650;letter-spacing:.2px}
.sh .sub{font-size:.78rem;color:var(--muted);margin-top:4px;line-height:1.3}
.sh .back{
  background:none;border:none;
  color:var(--muted);
  font-size:.9rem;
  cursor:pointer;
  padding:6px 10px;
  border-radius:10px;
}
.sh .back:active{background:var(--line);color:var(--ink)}

/* 卡片 */
.gc{
  background:var(--paper);
  border-radius:var(--rl);
  padding:16px;
  margin:0 14px 12px;
  border:1px solid var(--line);
}
.gc h3{font-size:.95rem;margin-bottom:8px;font-weight:650}
.gc p{font-size:.84rem;line-height:1.7;color:var(--muted)}
.gc p+p{margin-top:6px}

/* 输入 */
label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:6px}
input,textarea,select{
  width:100%;
  padding:12px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  font-size:.9rem;
  outline:none;
  font-family:inherit;
  transition:border-color .2s;
}
textarea{min-height:72px;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:rgba(200,168,106,.6)}
select{appearance:none;cursor:pointer}

/* 按钮（更克制） */
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.btn{
  display:inline-block;
  padding:11px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  font-size:.88rem;
  font-weight:600;
  cursor:pointer;
  transition:background .2s, transform .08s, border-color .2s, color .2s;
  font-family:inherit;
  background:transparent;
  color:var(--ink);
  white-space:nowrap;
}
.btn:active{transform:scale(.98);background:var(--line)}
.btn.primary{
  background:rgba(200,168,106,.16);
  border-color:rgba(200,168,106,.28);
  color:var(--ink);
}
.btn.primary:active{background:rgba(200,168,106,.22)}
.btn.ghost{background:transparent;color:var(--muted)}

/* tag：降低存在感 */
.tag{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  font-size:.68rem;
  background:rgba(27,26,23,.06);
  color:var(--muted);
  margin:2px 6px 2px 0;
  border:1px solid rgba(27,26,23,.06);
}
body.dark .tag{
  background:rgba(242,239,232,.06);
  border-color:rgba(242,239,232,.06);
}

/* home */
.stat-row{display:flex;gap:10px;margin-top:8px}
.stat-box{flex:1;text-align:center;padding:12px;background:var(--card);border-radius:12px;border:1px solid var(--line)}
.stat-box .num{font-size:1.35rem;font-weight:650;color:var(--ink)}
.stat-box .lbl{font-size:.7rem;color:var(--muted)}
.qbtn{
  display:block;width:100%;
  padding:13px 12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--ink);
  font-size:.9rem;
  cursor:pointer;
  transition:background .2s;
  text-align:left;
  margin-bottom:8px;
  font-family:inherit;
}
.qbtn:active{background:var(--line)}
.qbtn .qbi{font-size:1.05rem;margin-right:8px;opacity:.65}

/* spread */
.spread-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.spread-item{
  padding:10px;
  border-radius:12px;
  border:1px solid var(--line);
  cursor:pointer;
  text-align:center;
  font-size:.78rem;
  background:transparent;
  transition:background .2s, border-color .2s;
}
.spread-item.on{
  border-color:rgba(200,168,106,.32);
  background:rgba(200,168,106,.10);
}
.spread-item .si-n{font-size:1.05rem;font-weight:650;color:var(--ink);display:block;opacity:.9}

/* dealer overlay */
#dealer{
  position:fixed;inset:0;
  background:var(--bg);
  z-index:200;
  display:none;
  flex-direction:column;
}
#dealer.on{display:flex;animation:scrIn .2s}
.dhd{padding:14px 18px;text-align:center;flex-shrink:0}
.dhd h3{font-size:1rem;margin-bottom:4px;font-weight:650}
.dhd p{font-size:.78rem;color:var(--muted)}
.dbd{flex:1;position:relative;overflow:hidden;min-height:300px}
.dft{padding:12px 18px;text-align:center;flex-shrink:0;border-top:1px solid var(--line);background:color-mix(in oklab, var(--bg), var(--paper) 20%)}

.dc{
  position:absolute;
  bottom:-50px;left:50%;
  width:68px;height:116px;
  border-radius:10px;
  transform-origin:bottom center;
  cursor:pointer;user-select:none;
  transition:transform .35s cubic-bezier(.23,1,.32,1), border-color .2s, background .2s;
  border:1px solid rgba(27,26,23,.18);
  background:linear-gradient(145deg, rgba(27,26,23,.08), rgba(27,26,23,.02));
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;color:var(--muted);
}
body.dark .dc{
  border-color:rgba(242,239,232,.16);
  background:linear-gradient(145deg, rgba(242,239,232,.06), rgba(242,239,232,.02));
}
.dc::before{
  content:'';
  position:absolute;inset:6px;border-radius:7px;
  border:1px solid rgba(200,168,106,.18);
}
.dc.sel{
  border-color:rgba(200,168,106,.55) !important;
  background:rgba(200,168,106,.12);
  color:var(--ink);
}

/* reveal */
.rv-spread{display:grid;gap:10px;margin:12px 14px}
.rv-spread.g3{grid-template-columns:repeat(3,1fr)}
.rv-spread.g1{grid-template-columns:1fr;max-width:220px;margin-left:auto;margin-right:auto}
.rv-spread.g5{grid-template-columns:repeat(auto-fit,minmax(104px,1fr))}
.rv-spread.g10{grid-template-columns:repeat(auto-fit,minmax(92px,1fr))}

.rv-card{
  background:var(--paper);
  border-radius:14px;
  padding:14px;
  border:1px solid var(--line);
  animation:cardUp .35s cubic-bezier(.23,1,.32,1) both;
  cursor:pointer;
  transition:transform .15s;
}
.rv-card:active{transform:translateY(-1px)}
@keyframes cardUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rv-card .rv-name{font-weight:650;font-size:.9rem;margin:6px 0 4px}
.rv-card .rv-pos{font-size:.7rem;color:var(--muted);margin-bottom:6px}
.rv-card .rv-kw{font-size:.78rem;color:var(--ink);font-weight:600;opacity:.85}
.rv-card .rv-detail{font-size:.78rem;line-height:1.65;margin-top:8px;display:none;color:var(--muted)}
.rv-card.exp .rv-detail{display:block}

/* yao */
.yao-row{display:flex;align-items:center;gap:10px;margin:6px 0;animation:cardUp .2s both}
.yao-bar{flex:1;height:12px;border-radius:6px;background:rgba(200,168,106,.75)}
.yao-bar.yin{background:linear-gradient(to right,rgba(200,168,106,.75) 0 40%,transparent 40%60%,rgba(200,168,106,.75) 60% 100%)}
.yao-lbl{width:32px;font-size:.7rem;color:var(--muted);text-align:right}
.yao-mk{font-size:.75rem;font-weight:650;color:var(--ink);min-width:16px;opacity:.85}

/* AI overlay（保留原功能，做减法视觉） */
.ai-box{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.ai-box.on{display:flex;animation:scrIn .2s}
.ai-hd{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-shrink:0;background:color-mix(in oklab, var(--bg), var(--paper) 25%)}
.ai-hd h3{flex:1;font-size:.95rem;font-weight:650}
.ai-hd .cls{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:6px 10px;border-radius:10px}
.ai-hd .cls:active{background:var(--line);color:var(--ink)}
.ai-msgs{flex:1;overflow-y:auto;padding:14px}
.ai-msg{margin-bottom:10px;max-width:86%}
.ai-msg.bot{margin-right:auto}
.ai-msg.user{margin-left:auto;text-align:right}
.ai-msg .bubble{
  display:inline-block;
  padding:10px 12px;
  border-radius:14px;
  font-size:.84rem;
  line-height:1.6;
  border:1px solid var(--line);
  background:var(--paper);
  color:var(--ink);
}
.ai-msg.user .bubble{
  background:rgba(200,168,106,.16);
  border-color:rgba(200,168,106,.24);
}
.ai-msg .bubble.thinking{color:var(--muted)}
.ai-ft{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0;background:color-mix(in oklab, var(--bg), var(--paper) 25%)}
.ai-ft input{flex:1;border-radius:999px;padding:10px 14px}
.ai-ft .btn{border-radius:999px;padding:10px 14px}

/* BOOK overlay: 倒计时 + 翻书动画 */
#book-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:250;
  display:none;
  align-items:center;justify-content:center;
  padding:22px;
}
#book-overlay.on{display:flex;animation:scrIn .2s}

.book{
  width:min(360px, 100%);
  border-radius:18px;
  background:var(--paper);
  border:1px solid var(--line);
  overflow:hidden;
}
.book-inner{
  position:relative;
  padding:20px 18px 18px;
  min-height:260px;
}
.book-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.book .pg{font-size:.72rem;color:var(--muted)}
.book .btitle{font-size:1.08rem;font-weight:650;color:var(--ink);letter-spacing:.2px}
.book .btext{font-size:.9rem;line-height:1.85;color:var(--ink);opacity:.88;margin-top:10px}

/* 倒计时层 */
.bk-mask{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:color-mix(in oklab, var(--paper), transparent 0%);
  transition:opacity .2s;
}
.bk-count{
  font-size:3.4rem;
  font-weight:200; /* 你要求的超细字重 */
  letter-spacing:1px;
  color:var(--ink);
  opacity:.9;
}
.bk-hint{margin-top:6px;font-size:.78rem;color:var(--muted)}
.bk-hidden{display:none}

/* 翻页动画容器 */
.bk-page{
  transform-origin:left center;
  animation: none;
}
.bk-flip{
  animation: flip .55s cubic-bezier(.23,1,.32,1);
}
@keyframes flip{
  0%{transform:perspective(900px) rotateY(0deg);opacity:1}
  45%{transform:perspective(900px) rotateY(-80deg);opacity:.25}
  55%{transform:perspective(900px) rotateY(-100deg);opacity:.15}
  100%{transform:perspective(900px) rotateY(0deg);opacity:1}
}

/* history */
.hi-item .hi-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px}
.hi-item .hi-actions{display:flex;gap:6px}
.hi-item .hi-btn{
  font-size:.72rem;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
}
.hi-item .hi-btn:active{background:var(--line);color:var(--ink)}

/* settings */
.set-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.set-item:last-child{border-bottom:none}
.set-item .set-l{font-size:.9rem}
.set-item .set-r{font-size:.84rem;color:var(--muted)}
.toggle{
  width:48px;height:26px;border-radius:13px;background:rgba(27,26,23,.10);
  cursor:pointer;position:relative;transition:.2s;border:1px solid var(--line);
}
body.dark .toggle{background:rgba(242,239,232,.10)}
.toggle.on{background:rgba(200,168,106,.35);border-color:rgba(200,168,106,.28)}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;
  background:var(--paper);border:1px solid var(--line);transition:.2s;
}
.toggle.on::after{left:25px}

/* empty */
.empty{text-align:center;padding:40px 18px;color:var(--muted);font-size:.9rem}

/* NAV: 固定底部 + 毛玻璃 */
#nav{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:min(480px, 100%);
  height:var(--navH);
  display:none;
  align-items:center;
  justify-content:space-around;
  z-index:60;

  background:rgba(251,248,242,.72);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-top:1px solid var(--line);
}
body.dark #nav{
  background:rgba(23,22,18,.72);
}
#nav.show{display:flex}

.nav-i{
  font-size:.64rem;
  text-align:center;
  color:var(--muted);
  cursor:pointer;
  padding:8px 6px;
  min-width:52px;
  border-radius:12px;
  transition:background .2s, color .2s;
}
.nav-i .ni{font-size:1.06rem;display:block;margin-bottom:2px;opacity:.75}
.nav-i.on{
  color:var(--ink);
  background:rgba(200,168,106,.14);
  border:1px solid rgba(200,168,106,.18);
}
.nav-i.on .ni{opacity:.9}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(27,26,23,.12);border-radius:3px}
body.dark ::-webkit-scrollbar-thumb{background:rgba(242,239,232,.14)}

/* util */
.mt{margin-top:12px}.tc{text-align:center}
</style>
</head>

<body>
<div id="app">

  <!-- LOGIN -->
  <div id="login-scr" class="scr on" style="align-items:center;justify-content:center;padding:40px 20px;text-align:center">
    <h1 style="font-size:1.8rem;font-weight:650;letter-spacing:.4px">灵性祭坛</h1>
    <p class="desc" style="color:var(--muted);font-size:.86rem;margin:8px 0 26px">塔罗 · 六爻 · 答案之书</p>
    <input id="login-name" placeholder="请输入昵称" maxlength="20" style="max-width:300px;margin-bottom:12px" />
    <input id="login-pw" placeholder="密码（可选）" type="password" maxlength="20" style="max-width:300px;margin-bottom:12px" />
    <button class="btn primary" style="width:100%;max-width:300px" onclick="doLogin()">进入</button>
    <div id="user-list" class="ulist" style="max-width:300px;width:100%;margin-top:16px"></div>
  </div>

  <!-- HOME -->
  <div id="home-scr" class="scr">
    <div class="sh">
      <div>
        <h1 id="home-greet"></h1>
        <div class="sub" id="home-date"></div>
      </div>
      <button class="back" onclick="goSettings()">设置</button>
    </div>

    <div class="gc tc">
      <p id="daily-msg" style="font-size:.92rem;color:var(--ink);font-weight:600;opacity:.85"></p>
    </div>

    <div class="gc">
      <div class="stat-row">
        <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">总记录</div></div>
        <div class="stat-box"><div class="num" id="stat-tarot">0</div><div class="lbl">塔罗</div></div>
        <div class="stat-box"><div class="num" id="stat-yao">0</div><div class="lbl">六爻 / 书</div></div>
      </div>
    </div>

    <div class="gc">
      <button class="qbtn" onclick="goTab('tarot')"><span class="qbi">🂠</span>塔罗占卜</button>
      <button class="qbtn" onclick="goTab('fortune')"><span class="qbi">◷</span>运势预测</button>
      <button class="qbtn" onclick="goTab('liuyao')"><span class="qbi">☯</span>六爻金钱卦</button>
      <button class="qbtn" onclick="openBook()"><span class="qbi">📖</span>答案之书</button>
    </div>
  </div>

  <!-- TAROT -->
  <div id="tarot-scr" class="scr">
    <div class="sh">
      <div>
        <h1>塔罗占卜</h1>
        <div class="sub">韦特 / 透特 · 78 张</div>
      </div>
      <button class="back" onclick="goTab('home')">返回</button>
    </div>

    <div class="gc">
      <label>选择牌组</label>
      <select id="deck-sel">
        <option value="waite">韦特 Rider-Waite</option>
        <option value="thoth">透特 Thoth</option>
      </select>

      <label class="mt">选择牌阵</label>
      <div class="spread-sel" id="spread-grid"></div>

      <label class="mt">占卜问题（可选）</label>
      <textarea id="t-question" placeholder="例：这段关系接下来会如何发展？"></textarea>

      <div class="row">
        <button class="btn primary" onclick="startTarot()">开始抽牌</button>
        <button class="btn ghost" onclick="clearTarotResult()">清空结果</button>
      </div>
    </div>

    <div id="tarot-result"></div>
  </div>

  <!-- FORTUNE -->
  <div id="fortune-scr" class="scr">
    <div class="sh">
      <div>
        <h1>运势预测</h1>
        <div class="sub">日 · 周 · 月 · 年</div>
      </div>
      <button class="back" onclick="goTab('home')">返回</button>
    </div>

    <div class="gc">
      <div class="spread-sel" id="fortune-grid"></div>
      <div class="row">
        <button class="btn primary" onclick="startFortune()">抽取运势</button>
      </div>
    </div>

    <div id="fortune-result"></div>
  </div>

  <!-- LIUYAO -->
  <div id="liuyao-scr" class="scr">
    <div class="sh">
      <div>
        <h1>六爻金钱卦</h1>
        <div class="sub">古法三币起卦 · 64 卦</div>
      </div>
      <button class="back" onclick="goTab('home')">返回</button>
    </div>

    <div class="gc">
      <label>占卜问题（可选）</label>
      <textarea id="y-question" placeholder="例：本月工作变动是否顺利？"></textarea>

      <div id="yao-box" style="margin:16px 0"></div>
      <p id="yao-status" style="font-size:.78rem;color:var(--muted);margin-bottom:10px">掷铜钱起卦，共需 6 次</p>

      <div class="row">
        <button class="btn primary" onclick="tossCoins()">掷铜钱</button>
        <button class="btn ghost" onclick="resetYao()">重新起卦</button>
      </div>
    </div>

    <div id="liuyao-result"></div>
  </div>

  <!-- HISTORY -->
  <div id="history-scr" class="scr">
    <div class="sh">
      <div>
        <h1>占卜记录</h1>
        <div class="sub" id="hist-info"></div>
      </div>
      <button class="back" onclick="goTab('more')">返回</button>
    </div>

    <div class="gc tc">
      <button class="btn ghost" onclick="clearAllHist()">清空全部记录</button>
    </div>
    <div id="hist-list"></div>
  </div>

  <!-- MORE -->
  <div id="more-scr" class="scr">
    <div class="sh">
      <div><h1>更多</h1></div>
      <button class="back" onclick="goTab('home')">返回</button>
    </div>

    <div class="gc">

/* ========== UTILS ========== */
function $(id){return document.getElementById(id)}
function esc(t){return String(t).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function uKey(k){return 'sa_'+S.user+'_'+k}
function getUsers(){return JSON.parse(localStorage.getItem('sa_users')||'{}')}
function saveUsers(u){localStorage.setItem('sa_users',JSON.stringify(u))}
function loadUserData(){
  S.history=JSON.parse(localStorage.getItem(uKey('hist'))||'[]');
  S.defDeck=localStorage.getItem(uKey('deck'))||'waite';
  S.deck=S.defDeck;
}
function saveHist(){localStorage.setItem(uKey('hist'),JSON.stringify(S.history))}

/* ========== USER ========== */
function showLogin(){
  S.tab='login';
  $('login-scr').classList.add('on');
  $('nav').classList.remove('show');
  document.querySelectorAll('.scr').forEach(s=>{ if(s.id!=='login-scr') s.classList.remove('on') });

  const users=getUsers();
  const names=Object.keys(users);
  const list=$('user-list');
  if(!names.length){list.innerHTML='';return;}

  list.innerHTML =
    '<p style="font-size:.78rem;color:var(--muted);margin-bottom:8px;text-align:left">已有账户</p>' +
    names.map(n=>{
      const nn=esc(n);
      return `
        <div style="padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:var(--paper);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer"
             onclick="quickLogin('${nn}')">
          <span style="font-size:.88rem">${nn}</span>
          <span style="font-size:.76rem;color:var(--muted);padding:6px 10px;border-radius:999px;border:1px solid var(--line)"
                onclick="event.stopPropagation();delUser('${nn}')">删除</span>
        </div>
      `;
    }).join('');
}
function doLogin(){
  const name=$('login-name').value.trim();
  const pw=$('login-pw').value;
  if(!name){alert('请输入昵称');return;}
  const users=getUsers();
  if(users[name] && users[name]!==pw){alert('密码错误');return;}
  users[name]=pw||'';
  saveUsers(users);
  loginUser(name);
}
function quickLogin(name){
  const users=getUsers();
  if(users[name]!=null){
    $('login-name').value=name;
    loginUser(name);
  }
}
function delUser(name){
  if(!confirm('删除账户 '+name+' 的所有数据？'))return;
  const users=getUsers();
  delete users[name];
  saveUsers(users);
  localStorage.removeItem('sa_'+name+'_hist');
  localStorage.removeItem('sa_'+name+'_deck');
  showLogin();
}
function loginUser(name){
  S.user=name;
  localStorage.setItem('sa_current_user',name);
  loadUserData();
  $('login-scr').classList.remove('on');
  $('nav').classList.add('show');
  goTab('home');
}
function doLogout(){
  S.user=null;
  localStorage.removeItem('sa_current_user');
  showLogin();
}

/* ========== DEALER（Bug#1 修复：不再 var 闭包错指） ========== */
function openDealer(title,count){
  S.picked=[];
  $('d-title').textContent=title;
  $('d-count').textContent=`已选 0/${count} 张`;

  const body=$('d-body');
  body.innerHTML='';

  const deck = (S.deck==='thoth') ? TH : WA;
  const total = deck.length;

  const fanAngle=110;
  const startA=-fanAngle/2;
  const step=fanAngle/Math.max(total-1,1);
  const rad=Math.min(220, innerWidth*0.5);
  body.style.height=(rad+90)+'px';

  for(let i=0;i<total;i++){
    const a = startA + i*step;

    const el=document.createElement('div');
    el.className='dc';
    el.style.transform=`translateX(-50%) rotate(${a}deg) translateY(-${rad}px)`;
    el.dataset.i=i;
    el.innerHTML='<span style="opacity:.55">✦</span>';

    // 关键：用 let / 直接引用当前 el，不会指向最后一张
    el.addEventListener('click', ()=>pickDC(el,i,a,rad,count));
    body.appendChild(el);
  }
  $('dealer').classList.add('on');
}
function pickDC(el,i,a,rad,max){
  if(el.classList.contains('sel')||S.picked.length>=max) return;
  el.classList.add('sel');
  S.picked.push(i);
  $('d-count').textContent=`已选 ${S.picked.length}/${max} 张`;
  el.style.transform=`translateX(-50%) rotate(${a}deg) translateY(-${rad+26}px) scale(1.06)`;
  if(navigator.vibrate) navigator.vibrate(18);
  if(S.picked.length===max) setTimeout(()=>confirmDealer(), 260);
}
function closeDealer(){ $('dealer').classList.remove('on') }
function confirmDealer(){
  const spDef = SPREADS[S.spread] || FORTUNES[S.spread];
  if(!spDef) return;
  if(S.picked.length!==spDef.n){alert('请选满 '+spDef.n+' 张牌');return;}

  const deck = (S.deck==='thoth') ? TH : WA;
  const cards = S.picked.map((idx,i)=>{
    const base=deck[idx];
    const rev=Math.random()<0.35;
    return {
      name:base[0], suit:base[1], num:base[2],
      kw:base[3],
      pos:spDef.pos[i]||('位置 '+(i+1)),
      rev,
      love:rev?base[5]:base[4],
      career:rev?base[7]:base[6]
    };
  });

  closeDealer();
  if(S.dealerType==='tarot') renderTarotResult(cards,spDef);
  else if(S.dealerType==='fortune') renderFortuneResult(cards,spDef);
}

/* ========== TAROT ========== */
function startTarot(){
  S.dealerType='tarot';
  const spDef=SPREADS[S.spread];
  if(!spDef) return;
  openDealer('静心片刻，抽取 '+spDef.n+' 张牌', spDef.n);
}
function renderTarotResult(cards,spDef){
  const q=$('t-question').value.trim();
  const deckName = (S.deck==='thoth') ? '透特塔罗' : '韦特塔罗';
  const revCount = cards.filter(c=>c.rev).length;

  let summary='';
  if(q) summary+='围绕「'+esc(q)+'」，';
  else summary+='整体来看，';

  if(revCount===0) summary+='能量顺畅，适合推进与落实。';
  else if(revCount===1) summary+='存在一个需要校准的点，先调整节奏再行动。';
  else if(revCount<=3) summary+='有几处阻滞，建议优先理清边界与优先级。';
  else summary+='阻力偏多，建议先做减法：休息、止损、再定策略。';

  let html = `<div class="gc"><h3>${esc(deckName)} · ${esc(spDef.name)}</h3>`;
  if(q) html += `<p><span class="tag">问题</span>${esc(q)}</p>`;
  html += `</div>`;

  html += `<div class="rv-spread ${spDef.grid}">`;
  cards.forEach(c=>{
    html += `
      <div class="rv-card" onclick="this.classList.toggle('exp')">
        <div class="rv-pos">
          <span class="tag">${esc(c.pos)}</span>
          <span class="tag">${c.rev?'逆位':'正位'}</span>
        </div>
        <div class="rv-name">${esc(c.name)}</div>
        <div class="rv-kw">${esc(c.kw)}</div>
        <div class="rv-detail">
          <p>爱情：${esc(c.love)}</p>
          <p>事业：${esc(c.career)}</p>
        </div>
      </div>`;
  });
  html += `</div>`;

  html += `<div class="gc"><h3>综合指引</h3><p>${summary}</p></div>`;
  html += `<div class="gc tc">
    <button class="btn primary" onclick="saveToHist('tarot')">保存记录</button>
    <button class="btn ghost" onclick="openAIWith('tarot')">AI 解读</button>
  </div>`;

  $('tarot-result').innerHTML=html;
  S._lastResult={type:'tarot',spread:spDef.name,question:q,cards};
}
function clearTarotResult(){
  $('t-question').value='';
  $('tarot-result').innerHTML='';
  S.picked=[];
}

/* ========== I CHING（保留你原核心逻辑：若要完整卦辞/爻辞，请把原常量粘贴回来） ========== */
const YAO_POS=['初爻','二爻','三爻','四爻','五爻','上爻'];

function tossCoins(){
  if(S.yaoResult.length>=6) return;

  const c=[Math.random()<.5?0:1,Math.random()<.5?0:1,Math.random()<.5?0:1];
  const sum=c[0]+c[1]+c[2];

  let type,yang,sym;
  if(sum===3){type='老阳';yang=true;sym='○'}
  else if(sum===0){type='老阴';yang=false;sym='×'}
  else if(sum===2){type='少阴';yang=false;sym='- -'}
  else{type='少阳';yang=true;sym='—'}

  S.yaoResult.push({type,yang,sym});
  renderYaoLine(S.yaoResult.length-1);
  if(S.yaoResult.length===6) setTimeout(renderLiuyao, 220);
}
function renderYaoLine(i){
  const y=S.yaoResult[i];
  const box=$('yao-box');
  const row=document.createElement('div');
  row.className='yao-row';
  row.innerHTML=`
    <span class="yao-lbl">${YAO_POS[i]}</span>
    <div class="yao-bar${y.yang?'':' yin'}">${(y.type.startsWith('老')?`<span class="yao-mk">${y.sym}</span>`:'')}</div>
    <span style="font-size:.72rem;color:var(--muted);min-width:40px">${y.type}</span>
  `;
  box.appendChild(row);
  $('yao-status').textContent=`已掷 ${S.yaoResult.length}/6 次${S.yaoResult.length===6?' — 卦已成':''}`;
}
function resetYao(){
  S.yaoResult=[];
  $('yao-box').innerHTML='';
  $('yao-status').textContent='掷铜钱起卦，共需 6 次';
  $('liuyao-result').innerHTML='';
}
function yaoBit(y){return y.yang?'1':'0'}
function changeBit(y){return y.type==='老阳'?'0':y.type==='老阴'?'1':yaoBit(y)}
function getTrigram(bits){
  const m={'111':0,'110':1,'101':2,'100':3,'011':4,'010':5,'001':6,'000':7};
  return m[bits]??0;
}
function renderLiuyao(){
  const obits=S.yaoResult.map(yaoBit).join('');
  const cbits=S.yaoResult.map(changeBit).join('');

  const upperO=obits.substring(0,3), lowerO=obits.substring(3,6);
  const ui=getTrigram(upperO), li=getTrigram(lowerO);
  const oName=GUA_NAME[ui][li];

  const q=$('y-question').value.trim();
  let html=`<div class="gc"><h3>起卦结果</h3>`;
  if(q) html += `<p><span class="tag">问题</span>${esc(q)}</p>`;
  html += `</div>`;

  html += `<div class="gc"><h3>本卦：${esc(oName)}</h3><p style="font-size:.78rem;color:var(--muted)">上 ${TNAME[ui]} 下 ${TNAME[li]}</p></div>`;
  html += `<div class="gc"><h3>六爻排盘</h3>`;
  for(let i=5;i>=0;i--){
    const y=S.yaoResult[i];
    const isMv=y.type.startsWith('老');
    html += `
      <div class="yao-row">
        <span class="yao-lbl">${YAO_POS[i]}</span>
        <div class="yao-bar${y.yang?'':' yin'}">${isMv?`<span class="yao-mk">${y.sym}</span>`:''}</div>
        <span style="font-size:.72rem;color:var(--muted);min-width:54px">${isMv?'动爻':''}</span>
      </div>
    `;
  }
  html += `</div>`;

  const moving=[];
  S.yaoResult.forEach((y,i)=>{ if(y.type.startsWith('老')) moving.push(i+1) });

  let summary=`本卦「${oName}」。`;
  if(moving.length) summary+=`动爻在第 ${moving.join('、')} 爻，建议重点观察对应位置的变化与时机。`;
  else summary+=`静卦，适合守正、稳步推进。`;

  html += `<div class="gc"><h3>综合判断</h3><p>${esc(summary)}</p></div>`;
  html += `<div class="gc tc">
    <button class="btn primary" onclick="saveToHist('liuyao')">保存记录</button>
    <button class="btn ghost" onclick="openAIWith('liuyao')">AI 解读</button>
  </div>`;

  $('liuyao-result').innerHTML=html;
  S._lastResult={type:'liuyao',oName:oName,cName:'',moving,summary};
}

/* ========== BOOK（Bug#2 修复 + 倒计时 + 翻书动画） ========== */
function openBook(){
  // 打开时先倒计时，倒计时结束再翻页显示内容
  $('book-overlay').classList.add('on');
  startBookCountdown(3, true);
}
function startBookCountdown(seconds, firstOpen){
  // reset mask + content state
  clearInterval(S._bookTimer);
  const mask=$('bk-mask');
  const countEl=$('bk-count');
  mask.classList.remove('bk-hidden');

  // 打开时先把文字清掉/保持上次内容也可以，这里选择清空以符合“倒计时后揭示”
  if(firstOpen){
    $('bk-pg').textContent='';
    $('bk-title').textContent='';
    $('bk-text').textContent='';
  }

  let t=seconds;
  countEl.textContent=String(t);

  S._bookTimer=setInterval(()=>{
    t--;
    if(t<=0){
      clearInterval(S._bookTimer);
      mask.classList.add('bk-hidden');   // 关键：倒计时结束正确切换 display
      revealBookPage(true);             // 翻书动画揭示
    }else{
      countEl.textContent=String(t);
    }
  }, 1000);
}
function revealBookPage(withFlip){
  const p=BOOK[Math.floor(Math.random()*BOOK.length)];
  showBookPage(p);

  const page=$('bk-page');
  if(withFlip){
    page.classList.remove('bk-flip');
    // 强制重绘以便重复触发动画
    void page.offsetWidth;
    page.classList.add('bk-flip');
  }
}
function flipBook(){
  // 再翻一页：直接翻页动画 + 替换内容
  revealBookPage(true);
}
function showBookPage(p){
  $('bk-pg').textContent='第 '+(BOOK.indexOf(p)+1)+' 页';
  $('bk-title').textContent=p.t;
  $('bk-text').textContent=p.x;
  S._lastBook=p;
}
function saveBookPage(){
  if(!S._lastBook){alert('没有可保存内容');return;}
  S.history.unshift({
    type:'book',
    spread:'答案之书',
    question:'',
    cards:[{name:S._lastBook.t,pos:'第 '+(BOOK.indexOf(S._lastBook)+1)+' 页',meaning:S._lastBook.x}],
    time:new Date().toLocaleString('zh-CN')
  });
  saveHist();
  updateHome();
  alert('已保存');
}
function closeBook(){
  clearInterval(S._bookTimer);
  $('book-overlay').classList.remove('on');
}

/* ========== HISTORY（删除雷诺曼映射） ========== */
function renderHistory(){
  $('hist-info').textContent='共 '+S.history.length+' 条记录';
  if(!S.history.length){
    $('hist-list').innerHTML='<div class="gc empty">暂无记录</div>';
    return;
  }
  let html='';
  const tn={tarot:'塔罗',fortune:'运势',season:'季节',liuyao:'六爻',book:'答案之书'};
  S.history.forEach((item,i)=>{
    html += `
      <div class="gc hi-item">
        <div class="hi-hd">
          <div><strong>${esc(tn[item.type]||'记录')}</strong> · <span style="font-size:.72rem;color:var(--muted)">${esc(item.time||'')}</span></div>
          <div class="hi-actions">
            <button class="hi-btn" onclick="shareHist(${i})">分享</button>
            <button class="hi-btn" onclick="delHist(${i})">删除</button>
          </div>
        </div>
    `;
    if(item.question) html += `<p><span class="tag">问题</span>${esc(item.question)}</p>`;
    if(item.spread) html += `<p><span class="tag">${esc(item.spread)}</span></p>`;
    if(item.cards) html += `<p style="font-size:.8rem;color:var(--muted)">${item.cards.map(c=>esc(c.pos)+'·'+esc(c.name)+(c.rev?'(逆)':'')).join(' / ')}</p>`;
    if(item.summary) html += `<p style="font-size:.8rem;color:var(--muted)">${esc(item.summary)}</p>`;
    html += `</div>`;
  });
  $('hist-list').innerHTML=html;
}
function saveToHist(type){
  if(!S._lastResult){alert('没有可保存的内容');return;}
  const item=Object.assign({}, S._lastResult, {time:new Date().toLocaleString('zh-CN')});
  S.history.unshift(item);
  saveHist();
  updateHome();
  renderHistory();
  alert('已保存');
}
function delHist(i){
  if(!confirm('确定删除？')) return;
  S.history.splice(i,1);
  saveHist();
  updateHome();
  renderHistory();
}
function shareHist(i){
  const item=S.history[i];
  let text=(item.spread||'占卜')+' · '+(item.time||'')+'\n';
  if(item.question) text+='问题：'+item.question+'\n';
  if(item.cards) text+=item.cards.map(c=>c.pos+'·'+c.name+(c.rev?'(逆)':'')).join(' / ')+'\n';
  if(item.summary) text+=item.summary+'\n';
  text+='—— 灵性祭坛';
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>alert('已复制'));
  else prompt('复制以下内容：',text);
}
function clearAllHist(){
  if(!confirm('确定清空？')) return;
  S.history=[];
  saveHist();
  updateHome();
  renderHistory();
}

/* ========== AI（移除雷诺曼措辞） ========== */
const AI_KEY='sk-wpiztvaqxnowxxzevmynvexutwtvywidxzkkqpefsjxihipq';
const AI_URL='https://api.siliconflow.cn/v1/chat/completions';
const AI_MODEL='Qwen/Qwen2.5-7B-Instruct';

function openAI(){
  S.aiMessages=[];
  $('ai-msgs').innerHTML='';
  addAIMsg('bot','你好，我是灵性祭坛的 AI 解读助手。你可以问我关于塔罗、六爻的问题。');
  $('ai-box').classList.add('on');
}
function openAIWith(type){
  openAI();
  if(!S._lastResult) return;
  const r=S._lastResult;
  let ctx='';

  if(type==='tarot'||type==='fortune'||type==='season'){
    ctx='我刚做了一次「'+r.spread+'」。';
    if(r.question) ctx+='问题是「'+r.question+'」。';
    ctx+='抽到的牌是：'+r.cards.map(c=>c.name+(c.rev?'(逆位)':'(正位)')).join('、')+'。请给出务实的解读与建议。';
  }else if(type==='liuyao'){
    ctx='我刚起了一卦，本卦「'+(r.oName||'')+'」。';
    if(r.moving&&r.moving.length) ctx+='动爻在第 '+r.moving.join('、')+' 爻。';
    ctx+='请给出务实的解读与建议。';
  }

  if(ctx){
    $('ai-input').value=ctx;
    sendAI();
  }
}
function closeAI(){ $('ai-box').classList.remove('on') }

function addAIMsg(role,text){
  const msgs=$('ai-msgs');
  const div=document.createElement('div');
  div.className='ai-msg '+role;
  div.innerHTML=`<div class="bubble">${esc(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}
async function sendAI(){
  const input=$('ai-input');
  const text=input.value.trim();
  if(!text) return;
  input.value='';
  addAIMsg('user',text);
  S.aiMessages.push({role:'user',content:text});

  const thinking=addAIMsg('bot','思考中…');
  thinking.querySelector('.bubble').classList.add('thinking');

  try{
    const resp=await fetch(AI_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+AI_KEY
      },
      body:JSON.stringify({
        model:AI_MODEL,
        messages:[
          {role:'system',content:'你是灵性祭坛的 AI 解读助手，精通塔罗牌与六爻。解读务实，少意象，多具体建议。用中文，简洁但有深度。'}
        ].concat(S.aiMessages),
        max_tokens:1024,
        temperature:0.7
      })
    });
    thinking.remove();
    if(!resp.ok){
      addAIMsg('bot','请求失败：'+resp.status);
      return;
    }
    const data=await resp.json();
    const reply=data.choices?.[0]?.message?.content || '没有返回内容。';
    addAIMsg('bot',reply);
    S.aiMessages.push({role:'assistant',content:reply});
  }catch(e){
    thinking.remove();
    addAIMsg('bot','网络连接失败：'+e.message);
  }
}
