<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塔罗占卜·命运之书</title>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C8A96E;
            --gold-dark: #A68A56;
            --max-width: 480px;
            --font-main: 'Noto Serif SC', serif;
            --font-eng: 'IM Fell English', serif;
        }
        body.light-theme { --bg-color: #F4F1EB; --text-color: #2C2A25; --card-bg: #FFFFFF; --border-color: rgba(0,0,0,0.1); }
        body.dark-theme { --bg-color: #111009; --text-color: #E8E6E1; --card-bg: #1A1914; --border-color: rgba(255,255,255,0.1); }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }
        
        #app-container { width: 100%; max-width: var(--max-width); min-height: 100vh; position: relative; background-color: var(--bg-color); display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.2); }

        /* 导航与通用组件 */
        .view-section { display: none; padding: 20px; padding-bottom: 80px; flex: 1; overflow-y: auto; position: relative; }
        .view-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-title { font-family: var(--font-eng); font-size: 24px; text-align: center; margin-bottom: 20px; color: var(--gold); }
        .btn-fill { background: var(--gold); color: #fff; border: none; padding: 12px; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-back { position: absolute; top: 15px; left: 15px; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: 4px; cursor: pointer; z-index: 10; font-size: 13px; }

        /* 选牌桌 - 居中优化 */
        #deal-wrap { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); 
            z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        .deal-prompt { color: var(--gold); font-size: 18px; margin-bottom: 30px; text-align: center; }
        #d-slots { position: relative; width: 100%; height: 200px; display: flex; justify-content: center; }
        .dc { 
            position: absolute; width: 45px; height: 75px; background: #2a2a2a; border: 1px solid var(--gold); 
            border-radius: 4px; bottom: 50%; transform-origin: bottom center; transition: 0.3s; cursor: pointer; 
        }
        .dc.selected { opacity: 0; pointer-events: none; }
        .deal-controls { width: 85%; margin-top: 50px; }
        .ipt-question { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid var(--gold); background: #222; color: #fff; text-align: center; }

        /* 结果展示 */
        .card-display-area { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .card-container { width: 80px; height: 130px; perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }
        .card-container.reversed.flipped .card-inner { transform: rotateY(180deg) rotateZ(180deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 4px; }
        .card-back { background: #2a2a2a; border: 1px solid var(--gold); }
        .card-front { background: var(--card-bg); border: 1px solid var(--border-color); transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; text-align: center; padding: 5px; }

        /* 答案之书 */
        #book-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; justify-content: center; align-items: center; }
        .book-wrapper { background: #fff; color: #222; width: 85%; max-width: 350px; min-height: 250px; padding: 30px; border-radius: 4px; position: relative; transition: 0.5s; box-shadow: inset 0 0 50px rgba(0,0,0,0.1); }
        .book-content { font-size: 22px; margin: 40px 0; font-weight: bold; line-height: 1.5; color: #333; }
        #book-breathe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: var(--gold); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 310; border-radius: 4px; }
        .breathe-circle { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, var(--gold) 0%, transparent 70%); animation: breathe 3s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { transform: scale(0.8); opacity: 0.4; } 50% { transform: scale(1.4); opacity: 1; } }
        .countdown-text { font-size: 40px; margin-top: 20px; font-family: var(--font-eng); }

        /* 记录列表 */
        .record-item { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); position: relative; }
        .btn-del { position: absolute; right: 10px; top: 10px; color: #ff4d4d; border: none; background: none; cursor: pointer; font-size: 12px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: var(--max-width); height: 60px; background: var(--card-bg); border-top: 1px solid var(--border-color); display: none; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { font-size: 12px; color: var(--text-color); opacity: 0.5; cursor: pointer; text-align: center; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body class="light-theme">

<div id="app-container">
    <div id="view-login" class="view-section active">
        <div class="header-title" style="margin-top: 50px;">Tarot & Oracle</div>
        <h2 style="text-align: center; margin-bottom: 30px;">开启你的专属祭坛</h2>
        <input type="text" id="ipt-username" style="width:100%; padding:12px; margin-bottom:15px;" placeholder="输入昵称">
        <button class="btn-fill" onclick="app.login()">进入</button>
    </div>

    <div id="view-home" class="view-section">
        <div class="header-title">Home</div>
        <h2 id="home-greeting">你好</h2>
        <p id="home-date" style="opacity: 0.6; margin-bottom: 30px; font-size: 14px;"></p>
        <button class="btn-fill" onclick="app.switchTheme()">切换主题颜色</button>
        <div style="background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--gold); text-align: center; cursor: pointer;" onclick="app.openBookOfAnswers()">
            <h3 style="color: var(--gold);">📖 翻开答案之书</h3>
            <p style="font-size: 12px; margin-top: 5px; opacity: 0.7;">默念问题，寻求瞬间的指引</p>
        </div>
    </div>

    <div id="view-tarot" class="view-section">
        <div class="header-title">Tarot Spreads</div>
        <button class="btn-fill" onclick="app.startSpread('daily', 1)">每日一牌 (1张)</button>
        <button class="btn-fill" onclick="app.startSpread('time', 3)">过去·现在·未来 (3张)</button>
        <button class="btn-fill" onclick="app.startSpread('cross', 10)">凯尔特十字 (10张)</button>
    </div>

    <div id="view-fortune" class="view-section">
        <div class="header-title">Fortunes</div>
        <button class="btn-fill" onclick="app.startSpread('fortune_month', 1)">本月运势指引</button>
        <button class="btn-fill" onclick="app.startSpread('fortune_year', 3)">年度综合运势 (3张)</button>
        <button class="btn-fill" onclick="app.startSpread('fortune_week', 3)">本周运势指引 (3张)</button>
    </div>

    <div id="view-history" class="view-section">
        <div class="header-title">History</div>
        <div id="history-list"></div>
    </div>

    <div id="view-result" class="view-section">
        <button class="btn-back" onclick="app.switchView(app.state.lastView || 'home')">返回</button>
        <div id="res-question-display" style="text-align: center; margin-top: 20px; font-style: italic; opacity: 0.7;"></div>
        <div class="header-title" id="res-title">解读结果</div>
        <div class="card-display-area" id="res-cards"></div>
        <div style="margin-top: 20px; text-align: center;">
            <button class="btn-fill" id="btn-reveal-all" onclick="app.revealAllCards()">一键翻开</button>
            <button class="btn-fill" id="btn-save-record" style="display:none; background:var(--gold-dark);" onclick="app.saveCurrentResult()">保存此次记录</button>
        </div>
        <div id="res-interpretation" style="margin-top: 20px; display: none; padding: 15px; background: rgba(200,169,110,0.1); border-radius: 8px;">
            <h3 style="color:var(--gold); margin-bottom: 10px;">🔮 深度解析报告</h3>
            <div id="res-local-text" style="line-height: 1.8; font-size: 14px; white-space: pre-wrap;"></div>
        </div>
    </div>

    <div class="bottom-nav" id="main-nav">
        <div class="nav-item" onclick="app.switchView('home')">首页</div>
        <div class="nav-item" onclick="app.switchView('tarot')">塔罗</div>
        <div class="nav-item" onclick="app.switchView('fortune')">运势</div>
        <div class="nav-item" onclick="app.switchView('history')">记录</div>
    </div>

    <div id="deal-wrap">
        <button class="btn-back" onclick="app.cancelDeal()">返回</button>
        <div class="deal-prompt">请凭借直觉抽取 <span id="deal-need-count">0</span> 张牌</div>
        <div id="d-slots"></div>
        <div class="deal-controls">
            <input type="text" id="ipt-question" class="ipt-question" placeholder="输入你想要问的问题...">
            <button class="btn-fill" onclick="app.quickPick()">一键直接抽牌</button>
        </div>
    </div>

    <div id="book-modal">
        <div class="book-wrapper">
            <div id="book-breathe">
                <p>沉静内心，深呼吸...</p>
                <div class="breathe-circle"></div>
                <div class="countdown-text" id="book-countdown">3</div>
            </div>
            <button class="btn-back" style="top:5px; left:5px;" onclick="document.getElementById('book-modal').style.display='none'">关闭</button>
            <div class="book-content" id="book-text">...</div>
            <div style="width: 40px; height: 2px; background: #ddd; margin: 0 auto;"></div>
            <p id="book-pg" style="margin-top: 20px; opacity: 0.5; font-family: serif;">Pg. 124</p>
        </div>
    </div>
</div>

<script>
const CARD_DATA = [
    { name: '愚人', up: '新的开始、冒险、纯真。', rev: '鲁莽、逃避、愚蠢。' },
    { name: '魔术师', up: '行动、沟通、创造力。', rev: '操纵、计划不周、缺乏动力。' },
    { name: '女祭司', up: '直觉、潜意识、神秘。', rev: '忽视直觉、肤浅、秘密暴露。' },
    { name: '皇后', up: '丰盈、母性、感官。', rev: '创造力受阻、依赖感、过度干预。' },
    { name: '皇帝', up: '权威、结构、稳固。', rev: '专制、死板、缺乏自律。' },
    { name: '教皇', up: '传统、精神引导、归属感。', rev: '反叛、束缚、过时的观念。' },
    { name: '恋人', up: '选择、和谐、关系。', rev: '失衡、不负责任的选择、疏离。' },
    { name: '战车', up: '胜利、意志力、方向感。', rev: '失去方向、情绪失控、侵略性。' },
    { name: '力量', up: '勇气、耐性、内在力量。', rev: '软弱、自疑、冲动。' },
    { name: '隐士', up: '寻求真理、孤独、内省。', rev: '孤僻、多疑、迷失方向。' },
    { name: '命运之轮', up: '转变、运气、周期。', rev: '坏运气、抗拒改变、被迫停滞。' }
];

const BOOK_ANSWERS = ["放手去做吧", "现在不是最佳时机", "换个角度看问题", "答案就在你心中", "顺其自然", "会带来意想不到的好运", "你需要更多的努力", "去寻求他人的帮助", "保持沉默", "大胆迈出第一步", "放下执念", "会有更好的安排"];

const app = {
    user: '',
    theme: 'light',
    state: { mode: '', needCount: 0, selectedCards: [], lastView: 'home', currentQuestion: '', tempDeck: [] },

    login() {
        const name = document.getElementById('ipt-username').value.trim();
        if (!name) return alert("请输入昵称");
        this.user = name;
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('main-nav').style.display = 'flex';
        this.switchView('home');
        document.getElementById('home-greeting').innerText = `你好，${name}`;
        document.getElementById('home-date').innerText = new Date().toLocaleDateString();
    },

    switchView(name) {
        if (name !== 'result') this.state.lastView = name;
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${name}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach((ni, i) => {
            ni.classList.toggle('active', ['home', 'tarot', 'fortune', 'history'][i] === name);
        });
        if (name === 'history') this.renderHistory();
    },

    switchTheme() {
        this.theme = this.theme === 'light' ? 'dark' : 'light';
        document.body.className = `${this.theme}-theme`;
    },

    // --- 选牌逻辑 ---
    startSpread(type, count) {
        this.state.needCount = count;
        this.state.selectedCards = [];
        this.state.tempDeck = [...CARD_DATA]; // 每次开始重新复制牌库，确保不重复
        document.getElementById('ipt-question').value = '';
        document.getElementById('deal-need-count').innerText = count;
        document.getElementById('deal-wrap').style.display = 'flex';
        this.renderFanCards();
    },

    renderFanCards() {
        const slots = document.getElementById('d-slots');
        slots.innerHTML = '';
        const total = 22; // 展示用的背牌数
        for (let i = 0; i < total; i++) {
            const card = document.createElement('div');
            card.className = 'dc';
            const angle = -60 + (120 / (total - 1)) * i;
            card.style.transform = `rotate(${angle}deg) translateY(-80px)`;
            card.onclick = () => this.pickCard(card);
            slots.appendChild(card);
        }
    },

    pickCard(el) {
        if (el.classList.contains('selected')) return;
        el.classList.add('selected');
        
        // 随机抽取一张并从临时牌库移除（去重核心）
        const idx = Math.floor(Math.random() * this.state.tempDeck.length);
        const card = this.state.tempDeck.splice(idx, 1)[0];
        const isRev = Math.random() > 0.5;
        this.state.selectedCards.push({ ...card, reversed: isRev });

        document.getElementById('deal-need-count').innerText = this.state.needCount - this.state.selectedCards.length;
        if (this.state.selectedCards.length >= this.state.needCount) {
            this.state.currentQuestion = document.getElementById('ipt-question').value;
            setTimeout(() => this.showResult(), 500);
        }
    },

    quickPick() {
        const needed = this.state.needCount - this.state.selectedCards.length;
        for (let i = 0; i < needed; i++) {
            const idx = Math.floor(Math.random() * this.state.tempDeck.length);
            const card = this.state.tempDeck.splice(idx, 1)[0];
            this.state.selectedCards.push({ ...card, reversed: Math.random() > 0.5 });
        }
        this.state.currentQuestion = document.getElementById('ipt-question').value;
        this.showResult();
    },

    cancelDeal() { document.getElementById('deal-wrap').style.display = 'none'; },

    // --- 结果页 ---
    showResult() {
        this.cancelDeal();
        this.switchView('result');
        document.getElementById('res-question-display').innerText = this.state.currentQuestion ? `“${this.state.currentQuestion}”` : "";
        document.getElementById('res-interpretation').style.display = 'none';
        document.getElementById('btn-save-record').style.display = 'none';
        document.getElementById('btn-reveal-all').style.display = 'inline-block';
        
        const area = document.getElementById('res-cards');
        area.innerHTML = '';
        this.state.selectedCards.forEach(card => {
            const wrap = document.createElement('div');
            wrap.className = `card-container ${card.reversed ? 'reversed' : ''}`;
            wrap.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                    <div class="card-front">
                        <div style="font-size:20px;">🃏</div>
                        <div style="margin-top:5px;"><b>${card.name}</b></div>
                        <div style="color:red; font-size:9px;">${card.reversed ? '(逆位)' : '(正位)'}</div>
                    </div>
                </div>`;
            wrap.onclick = () => { wrap.classList.add('flipped'); this.checkFlipped(); };
            area.appendChild(wrap);
        });
    },

    revealAllCards() {
        document.querySelectorAll('.card-container').forEach(c => c.classList.add('flipped'));
        this.checkFlipped();
    },

    checkFlipped() {
        const total = document.querySelectorAll('.card-container').length;
        const flipped = document.querySelectorAll('.card-container.flipped').length;
        if (total === flipped) {
            document.getElementById('btn-reveal-all').style.display = 'none';
            document.getElementById('btn-save-record').style.display = 'inline-block';
            this.generateInterpretation();
        }
    },

    generateInterpretation() {
        const interp = document.getElementById('res-interpretation');
        const textNode = document.getElementById('res-local-text');
        interp.style.display = 'block';

        let content = `根据本次抽牌，为您深度分析如下：\n\n`;
        this.state.selectedCards.forEach((c, i) => {
            content += `【位置 ${i+1}：${c.name} (${c.reversed?'逆':'正'})】\n牌意：${c.reversed ? c.rev : c.up}\n\n`;
        });

        content += `🔮 【深度符号学视角 (300字深度报告)】\n`;
        content += `基于《78度的塔罗》的深层理论，本次牌阵显示出一种共时性的能量共鸣。当您在心中默念“${this.state.currentQuestion || '未提及的问题'}”时，宇宙的随机性已转化为当下的必然。在塔罗的宏观视角下，每张牌都是您潜意识的镜子。这些牌卡的结合暗示了当前生活的某种循环。正位牌象征着能量的顺畅流动与显化，而逆位牌并非凶兆，而是提醒您某种能量正在向内收敛，或者存在延迟。如果您感到困惑，这正是一个内省的契机。\n\n`;
        content += `从元素生克法则来看，您抽中的牌组展示了火与水的交织，这往往代表着行动与情感的博弈。建议在接下来的周期内，不要急于做出决定。数字命理学指示，当前阶段属于“转化期”，即旧有的模式正在瓦解，新的可能尚未成型。请保持正念，观察接下来的梦境与直觉信号。记住，命运的最终舵盘始终在您手中，塔罗仅是为您拨开迷雾的灯火。`;

        textNode.innerText = content;
    },

    // --- 答案之书 ---
    openBookOfAnswers() {
        const modal = document.getElementById('book-modal');
        const breathe = document.getElementById('book-breathe');
        const countdown = document.getElementById('book-countdown');
        modal.style.display = 'flex';
        breathe.style.display = 'flex';
        
        let count = 3;
        countdown.innerText = count;
        const timer = setInterval(() => {
            count--;
            if (count <= 0) {
                clearInterval(timer);
                breathe.style.display = 'none';
                this.rollBook();
            } else {
                countdown.innerText = count;
            }
        }, 1000);
    },

    rollBook() {
        const text = document.getElementById('book-text');
        const pg = document.getElementById('book-pg');
        text.innerText = BOOK_ANSWERS[Math.floor(Math.random() * BOOK_ANSWERS.length)];
        pg.innerText = `Pg. ${Math.floor(Math.random() * 400) + 1}`;
    },

    // --- 记录存取 ---
    saveCurrentResult() {
        const key = `history_${this.user}`;
        let history = JSON.parse(localStorage.getItem(key) || '[]');
        history.unshift({
            id: Date.now(),
            date: new Date().toLocaleString(),
            question: this.state.currentQuestion || '无提问',
            cards: this.state.selectedCards.map(c => c.name + (c.reversed?'(逆)':'(正)')).join(' | ')
        });
        localStorage.setItem(key, JSON.stringify(history));
        alert("已保存到记录页");
        document.getElementById('btn-save-record').style.display = 'none';
    },

    renderHistory() {
        const list = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem(`history_${this.user}`) || '[]');
        if (history.length === 0) return list.innerHTML = "<p style='text-align:center; opacity:0.5;'>暂无记录</p>";
        list.innerHTML = history.map(h => `
            <div class="record-item">
                <button class="btn-del" onclick="app.deleteHistory(${h.id})">删除</button>
                <div style="font-size:11px; color:var(--gold);">${h.date}</div>
                <div style="margin:5px 0; font-weight:bold;">问：${h.question}</div>
                <div style="font-size:12px; opacity:0.8;">${h.cards}</div>
            </div>
        `).join('');
    },

    deleteHistory(id) {
        if (!confirm("确定删除吗？")) return;
        const key = `history_${this.user}`;
        let history = JSON.parse(localStorage.getItem(key) || '[]');
        history = history.filter(h => h.id !== id);
        localStorage.setItem(key, JSON.stringify(history));
        this.renderHistory();
    }
};
</script>
</body>
</html>
