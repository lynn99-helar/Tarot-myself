<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>神秘占卜 - 旗舰版</title>
<style>
  :root { --bg: #F4F1EB; --ink: #1A1814; --gold: #C8A96E; --paper: #FDFAF4; --acc: #8B6F47; }
  body { background: var(--bg); color: var(--ink); font-family: "Noto Serif SC", serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  
  /* 导航 */
  .nav { display: flex; gap: 10px; margin-bottom: 20px; }
  .nav-btn { padding: 8px 15px; border: 1px solid var(--acc); border-radius: 20px; cursor: pointer; font-size: 14px; }
  .nav-btn.active { background: var(--ink); color: white; }

  /* 扇形牌阵 - 核心修复 */
  #fan-area { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; align-items: center; }
  #fan-container { position: relative; width: 100%; height: 60vh; margin-top: 50px; perspective: 1000px; }
  .fan-card { position: absolute; width: 60px; height: 100px; left: calc(50% - 30px); top: 20%; background: #1a1a1a; border: 1px solid var(--gold); border-radius: 4px; transform-origin: center 250%; transition: all 0.3s; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
  .fan-card:hover { transform: rotate(var(--r)) translateY(-20px) !important; z-index: 1000; border-color: white; }
  .fan-card.picked { opacity: 0; transform: scale(0) translateY(-100px) !important; pointer-events: none; }

  /* 展示牌阵 */
  .card-display { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
  .card-unit { width: 80px; text-align: center; }
  .tarot-img { width: 70px; height: 110px; background: var(--ink); border-radius: 4px; margin-bottom: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .tarot-img.rev { transform: rotate(180deg); }
  .card-name-label { font-size: 12px; font-weight: bold; color: var(--acc); }

  /* 答案之书 - 修复点击 */
  #book-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; align-items: center; justify-content: center; }
  .book-body { background: var(--paper); width: 80%; max-width: 300px; padding: 40px 20px; border-radius: 4px 15px 15px 4px; text-align: center; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }

  /* 金钱卦 - 灵光象吉模式 */
  .gua-box { background: var(--paper); width: 100%; max-width: 350px; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-top: 20px; }
  .yao-container { display: flex; flex-direction: column-reverse; gap: 8px; margin-top: 20px; align-items: center; }
  .yao-row { width: 120px; height: 12px; background: #333; position: relative; }
  .yao-row.yin::after { content: ''; position: absolute; left: 40%; width: 20%; height: 100%; background: var(--paper); }
  .yao-tag { position: absolute; right: -60px; font-size: 12px; color: var(--acc); width: 50px; }

  .btn { width: 100%; padding: 12px; background: var(--ink); color: white; border: none; border-radius: 8px; margin: 10px 0; cursor: pointer; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-btn active" onclick="showSection('tarot')">塔罗</div>
  <div class="nav-btn" onclick="showSection('gua')">金钱卦</div>
</div>

<div id="tarot-section" style="width:100%; max-width:400px;">
  <textarea id="q" placeholder="输入你的困惑..." style="width:100%; height:60px; padding:10px; border-radius:8px; margin-bottom:10px;"></textarea>
  <button class="btn" onclick="openFan()">推开牌阵 (抽3张)</button>
  <div class="card-display" id="spread-box"></div>
  <button class="btn" style="background:#8b4513" onclick="openBook()">打开《答案之书》</button>
</div>

<div id="gua-section" style="display:none; width:100%; max-width:400px;">
  <div class="gua-box">
    <h3 style="text-align:center; margin-bottom:15px;">金钱卦 · 六爻起卦</h3>
    <button class="btn" id="roll-btn" onclick="rollGua()">掷硬币 (第 1 次)</button>
    <div class="yao-container" id="yao-box"></div>
  </div>
</div>

<div id="fan-area">
  <div style="padding:20px; text-align:center; background:white; width:100%;">请选择 3 张牌</div>
  <div id="fan-container"></div>
  <button class="btn" style="width:100px;" onclick="closeFan()">取消</button>
</div>

<div id="book-modal" onclick="closeBook()">
  <div class="book-body" onclick="event.stopPropagation()">
    <div id="book-res" style="font-size:1.2rem; min-height:60px; display:flex; align-items:center; justify-content:center; margin-bottom:30px; font-style:italic;">心中默念问题...</div>
    <button class="btn" onclick="flipBook()">翻开此页</button>
  </div>
</div>

<script>
const TAROT = ["愚者","魔术师","女祭司","女皇","皇帝","教皇","恋人","战车","力量","隐士","轮转","正义","倒吊","死神","节制","恶魔","高塔","星星","月亮","太阳","审判","世界"];
const ANS = ["是的，正是时候","现在不宜行动","换个思路会更好","保持耐心，结果自现","你需要一个帮手","答案就在你心中","去问问身边最信任的人","风险过大，暂缓执行"];
let picked = [];
let guas = [];

function showSection(s) {
  document.getElementById('tarot-section').style.display = s==='tarot'?'block':'none';
  document.getElementById('gua-section').style.display = s==='gua'?'block':'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(s==='tarot'?'塔罗':'卦')));
}

// --- 扇形逻辑 ---
function openFan() {
  const box = document.getElementById('fan-container');
  box.innerHTML = '';
  picked = [];
  document.getElementById('spread-box').innerHTML = '';
  document.getElementById('fan-area').style.display = 'flex';
  for(let i=0; i<22; i++) {
    const r = -60 + (i * 120 / 21);
    const c = document.createElement('div');
    c.className = 'fan-card';
    c.style.setProperty('--r', r+'deg');
    c.style.transform = `rotate(${r}deg)`;
    c.onclick = function() {
      if(picked.length >= 3) return;
      this.classList.add('picked');
      const id = Math.floor(Math.random()*22);
      const rev = Math.random() > 0.7;
      picked.push({name: TAROT[id], rev});
      addResult(TAROT[id], rev);
      if(picked.length === 3) setTimeout(closeFan, 600);
    };
    box.appendChild(c);
  }
}
function closeFan() { document.getElementById('fan-area').style.display = 'none'; }
function addResult(n, r) {
  document.getElementById('spread-box').innerHTML += `
    <div class="card-unit">
      <div class="tarot-img ${r?'rev':''}">
        <img src="https://api.placeholder.com/70/110?text=Card" style="width:100%">
      </div>
      <div class="card-name-label">${n}${r?'(逆)':'(正)'}</div>
    </div>`;
}

// --- 答案之书 ---
function openBook() { document.getElementById('book-modal').style.display = 'flex'; document.getElementById('book-res').innerText = '心中默念问题...'; }
function closeBook() { document.getElementById('book-modal').style.display = 'none'; }
function flipBook() { document.getElementById('book-res').innerText = ANS[Math.floor(Math.random()*ANS.length)]; }

// --- 金钱卦 ---
function rollGua() {
  if(guas.length >= 6) return;
  const heads = [Math.random()>0.5, Math.random()>0.5, Math.random()>0.5].filter(x=>x).length;
  let type = (heads===1 || heads===3) ? 'yang' : 'yin';
  let tag = "";
  if(heads===3) tag = "× 老阳";
  if(heads===0) tag = "○ 老阴";
  guas.push({type, tag});
  
  const yaoBox = document.getElementById('yao-box');
  yaoBox.innerHTML += `<div class="yao-row ${type==='yin'?'yin':''}"><span class="yao-tag">${tag}</span></div>`;
  
  if(guas.length < 6) document.getElementById('roll-btn').innerText = `掷硬币 (第 ${guas.length+1} 次)`;
  else document.getElementById('roll-btn').innerText = "起卦完成";
}
</script>
</body>
</html>
