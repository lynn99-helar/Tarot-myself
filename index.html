<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>灵性祭坛 · 专业版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--gold:#D4AF37;--rose:#E55A6C;--blue:#4A90E2;--purple:#8E44AD;
--bg:#0c0e1a;--paper:rgba(255,255,255,0.06);--glass:rgba(255,255,255,0.08);
--ink:#e8e6e3;--muted:#8a8a8a;--line:rgba(255,255,255,0.1);
--r:20px;--shadow:0 8px 32px rgba(0,0,0,0.4);
}
.light-mode{
--bg:#f0ece4;--paper:rgba(255,255,255,0.7);--glass:rgba(255,255,255,0.5);
--ink:#1a1814;--muted:#666;--line:rgba(0,0,0,0.08);
--shadow:0 8px 32px rgba(0,0,0,0.1);
}
body{font-family:'PingFang SC','Noto Sans SC','Quicksand',sans-serif;
background:var(--bg);color:var(--ink);display:flex;justify-content:center;
min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;
position:relative;z-index:1}
section{display:none;width:100%;min-height:100vh}
section.active{display:block}
header{padding:24px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.greeting{font-size:1.3rem;font-weight:700;
background:linear-gradient(135deg,var(--gold),var(--rose));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.date-info{font-size:.78rem;color:var(--muted)}
main{flex:1;padding:0 16px 100px}
.card{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-radius:var(--r);border:1px solid var(--line);padding:20px;margin-bottom:16px;
box-shadow:var(--shadow);transition:transform .3s}
.card:hover{transform:translateY(-2px)}
.card h3{font-size:1.05rem;margin-bottom:10px}
.card p,.card li{font-size:.88rem;line-height:1.7;color:var(--muted)}
.card p{margin-bottom:6px}
input,textarea,select{width:100%;padding:12px 14px;border-radius:14px;
border:1px solid var(--line);background:var(--paper);color:var(--ink);
font-size:.9rem;outline:none;font-family:inherit;transition:border .3s}
input:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:80px;resize:vertical}
label{font-size:.82rem;color:var(--muted);display:block;margin-bottom:6px}
.btn{display:inline-block;padding:12px 28px;border-radius:50px;border:none;
font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit}
.btn-gold{background:linear-gradient(135deg,#D4AF37,#E8B923);color:#fff;
box-shadow:0 6px 20px rgba(212,175,55,0.35)}
.btn-blue{background:linear-gradient(135deg,#4A90E2,#357ABD);color:#fff;
box-shadow:0 6px 20px rgba(74,144,226,0.35)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn:active{transform:scale(.96)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.72rem;
background:rgba(212,175,55,0.15);color:var(--gold);margin:2px 4px 2px 0}
.tag-rose{background:rgba(229,90,108,0.15);color:var(--rose)}
.tag-blue{background:rgba(74,144,226,0.15);color:var(--blue)}
/* 抽牌桌 */
#dealer{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;
flex-direction:column;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.dealer-head{padding:20px;text-align:center}
.dealer-head h3{font-size:1.1rem;margin-bottom:6px}
.dealer-body{flex:1;position:relative;overflow:hidden}
.deck-card{position:absolute;bottom:-50px;left:50%;width:76px;height:130px;
border-radius:12px;transform-origin:bottom center;cursor:pointer;
transition:all .4s cubic-bezier(.23,1,.32,1);
border:2px solid rgba(255,255,255,0.85);
box-shadow:0 8px 24px rgba(0,0,0,0.3);
background:linear-gradient(145deg,#1a1a2e,#16213e);
display:flex;align-items:center;justify-content:center;
font-size:1.6rem;color:rgba(212,175,55,0.7);user-select:none}
.deck-card:hover{z-index:20;box-shadow:0 12px 40px rgba(212,175,55,0.4)}
.deck-card.sel{border-color:var(--rose);box-shadow:0 0 20px rgba(229,90,108,0.5)}
.deck-card.flip{animation:cardFlip .6s forwards}
@keyframes cardFlip{
0%{transform:rotateY(0)}
50%{transform:rotateY(90deg)}
100%{transform:rotateY(0)}
}
.dealer-foot{padding:16px 20px;text-align:center}
/* 结果牌 */
.result-spread{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin:16px 0}
.result-card{background:var(--glass);backdrop-filter:blur(16px);border-radius:16px;
padding:16px;border:1px solid var(--line);animation:cardRise .5s cubic-bezier(.23,1,.32,1) both}
.result-card:nth-child(2){animation-delay:.15s}
.result-card:nth-child(3){animation-delay:.3s}
@keyframes cardRise{from{opacity:0;transform:translateY(20px) scale(.95)}
to{opacity:1;transform:translateY(0) scale(1)}}
.result-card .rc-name{font-weight:700;font-size:.95rem;margin-bottom:4px;
color:var(--gold)}
.result-card .rc-pos{font-size:.72rem;color:var(--muted);margin-bottom:8px}
.result-card .rc-text{font-size:.82rem;line-height:1.6}
/* 六爻 */
.yao-line{display:flex;align-items:center;gap:12px;margin:8px 0;
animation:slideIn .4s both}
.yao-line:nth-child(1){animation-delay:.05s}
.yao-line:nth-child(2){animation-delay:.1s}
.yao-line:nth-child(3){animation-delay:.15s}
.yao-line:nth-child(4){animation-delay:.2s}
.yao-line:nth-child(5){animation-delay:.25s}
.yao-line:nth-child(6){animation-delay:.3s}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.yao-bar{flex:1;height:12px;border-radius:6px;position:relative}
.yao-bar.yang{background:var(--gold)}
.yao-bar.yin{background:linear-gradient(to right,var(--gold) 0 42%,transparent 42% 58%,var(--gold) 58% 100%)}
.yao-label{width:36px;font-size:.72rem;color:var(--muted);text-align:right}
.yao-mark{position:absolute;right:-6px;top:-16px;font-size:.78rem;font-weight:700;color:var(--rose)}
/* 导航 */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
height:72px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
display:flex;justify-content:space-around;align-items:center;
border-top:1px solid var(--line);border-radius:20px 20px 0 0;z-index:50}
.nav-i{font-size:.7rem;text-align:center;color:var(--muted);cursor:pointer;
padding:6px 4px;transition:all .3s}
.nav-i.active{color:var(--gold);font-weight:700}
.nav-i .ni-icon{font-size:1.2rem;display:block;margin-bottom:2px}
/* 历史 */
.hist-item{animation:cardRise .4s both}
/* 主题按钮 */
.theme-btn{position:fixed;top:16px;right:16px;z-index:60;background:var(--glass);
backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:50%;
width:42px;height:42px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;
justify-content:center;transition:all .3s;color:var(--ink)}
.theme-btn:hover{background:var(--gold);color:#fff}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:.88rem}
.glow{animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{0%{box-shadow:0 0 15px rgba(212,175,55,0.15)}
100%{box-shadow:0 0 30px rgba(212,175,55,0.35)}}
.gua-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;margin:12px 0}
.gua-grid dt{font-weight:700;font-size:.82rem}
.gua-grid dd{font-size:.82rem;color:var(--muted);margin:0}
.hidden{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
</style>
</head>

<section id="view-liuyao">

<div>

</div>
</header>
<main>
<div class="card">
<label>占卜问题（可选）</label>
<textarea id="lQ" placeholder="例：本月工作变动是否顺利？"></textarea>

<div class="row">
<button class="btn btn-blue" onclick="toss()">掷铜钱</button>
<button class="btn btn-ghost" onclick="resetYao()">重新起卦</button>
</div>
<p style="font-size:.75rem;color:var(--muted);margin-top:8px" id="yaoStatus">点击掷钱，共需 6 次</p>
</div>
<div id="liuyaoRes" class="card">
<div class="empty">请先起卦 ✨</div>
</div>
</main>
</section>

<!-- ========== 历史页 ========== -->
<section id="view-history">
<header>
<div>
<h1 class="greeting">📖 历史记录</h1>
<p class="date-info" id="histCount">-</p>
</div>
</header>
<main>
<div class="card" style="text-align:right">
<button class="btn btn-ghost" onclick="clearHist()">清空全部</button>
</div>
<div id="histList"></div>
</main>
</section>

<!-- ========== 抽牌桌 ========== -->
<div id="dealer">
<div class="dealer-head">
<h3 id="dealerTitle">请静心冥想你的问题</h3>
<p id="dealerCount" style="font-size:.85rem;color:var(--muted)">已选 0 张</p>
</div>
<div class="dealer-body" id="dealerBody"></div>
<div class="dealer-foot">
<button class="btn btn-gold" onclick="confirmTarot()">确认解读</button>
<button class="btn btn-ghost" onclick="closeDealer()" style="margin-left:10px">取消</button>
</div>
</div>

<!-- ========== 底部导航 ========== -->
<nav>
<div class="nav-i active" data-v="home" onclick="go('home')">
<span class="ni-icon">🏠</span>首页
</div>
<div class="nav-i" data-v="tarot" onclick="go('tarot')">

</div>
<div class="nav-i" data-v="liuyao" onclick="go('liuyao')">

</div>

</div>
</nav>
</div>

function $(id){return document.getElementById(id)}
function esc(t){return String(t).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function rand(n){return Math.floor(Math.random()*n)}
function pick(arr){return arr[rand(arr.length)]}

// 粒子系统
function initParticles(){
const c=$("particles"),ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();window.addEventListener("resize",resize);
const ps=[];for(let i=0;i<60;i++)ps.push({x:rand(c.width),y:rand(c.height),
vx:(Math.random()-.5)*.3,vy:Math.random()*.4+.2,r:Math.random()*2+.5,
a:Math.random()*.5+.1,d:Math.random()*.005+.002});
(function draw(){
ctx.clearRect(0,0,c.width,c.height);
ps.forEach(p=>{
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle=`rgba(212,175,55,${p.a})`;ctx.fill();
p.x+=p.vx;p.y-=p.vy;p.a-=p.d;
if(p.y<0||p.a<0){p.y=c.height;p.x=rand(c.width);p.a=Math.random()*.5+.1}
});requestAnimationFrame(draw)})();
}

function startTarot(){
S.spread=parseInt($("spreadSel").value);
S.picked=[];
$("dealerCount").textContent=`已选 0/${S.spread} 张`;
$("dealer").style.display="flex";
const body=$("dealerBody");body.innerHTML="";
const total=TAROT.length;
const fan=55;const step=fan/(total-1);
const rad=Math.min(200,innerWidth*.45);
for(let i=0;i<total;i++){
const angle=-fan/2+i*step;
const el=document.createElement("div");el.className="deck-card";
el.style.transform=`translateX(-50%) rotate(${angle}deg) translateY(-${rad}px)`;
el.dataset.idx=i;el.textContent="✦";
el.onclick=()=>pickCard(el,i,angle);
body.appendChild(el);
}
}

function pickCard(el,i,angle){
if(el.classList.contains("sel"))return;
if(S.picked.length>=S.spread)return;
el.classList.add("sel");S.picked.push(i);
$("dealerCount").textContent=`已选 ${S.picked.length}/${S.spread} 张`;
el.style.transform=`translateX(-50%) rotate(${angle}deg) translateY(-${rad+40}px) scale(1.1)`;
if(navigator.vibrate)navigator.vibrate(30);
}

function closeDealer(){$("dealer").style.display="none"}

function confirmTarot(){
if(S.picked.length!==S.spread){
alert(`请选满 ${S.spread} 张牌`);return}
const positions={1:["指引"],3:["过去","现在","未来"],5:["现状","挑战","潜意识","近期未来","最终结果"]};
const pos=positions[S.spread]||positions[3];
const cards=S.picked.map((idx,i)=>{
const base=TAROT[idx];
const rev=Math.random()<.35;
return{...base,rev,pos:pos[i]||"位置"+(i+1),
meaning:rev?base.rev:base.up};
});
renderTarot(cards);
saveToHistory({type:"tarot",q:$("tQ").value.trim(),cards,time:nowStr()});
closeDealer();go("tarot");
}

function renderTarot(cards){
const q=$("tQ").value.trim();
const revCount=cards.filter(c=>c.rev).length;
let summary=q?`围绕「${esc(q)}」这个问题，`:"整体来看，";
if(revCount===0)summary+="能量非常顺畅，牌面皆为正位，事情有明显推进力。";
else if(revCount===1)summary+="存在一处阻滞，需要修正某方面的认知或节奏。";
else summary+="阻力较多，建议先处理内在的失衡，放慢判断。";
summary+=" 以下为你详细解读每张牌：";

const suitNames={major:"大阿卡那",wands:"权杖",cups:"圣杯",swords:"宝剑",pentacles:"星币"};
let html=`<h3>🔮 塔罗解读</h3>`;
if(q)html+=`<p><span class="tag">问题</span>${esc(q)}</p>`;
html+=`<div class="result-spread">`;
cards.forEach(c=>{
html+=`<div class="result-card">
<div class="rc-name">${c.name}${c.rev?" 逆位":""}</div>
<div class="rc-pos"><span class="tag">${c.pos}</span><span class="tag-rose tag">${suitNames[c.suit]}</span></div>
<div class="rc-text">${c.meaning.love}</div>
<div class="rc-text" style="margin-top:6px">💼 ${c.meaning.career}</div>
</div>`;
});
html+=`</div>
<div class="card" style="margin-top:12px">
<h3>✨ 综合指引</h3>
<p>${summary}</p>
</div>`;
$("tarotRes").innerHTML=html;
}

function clearTarot(){
$("tQ").value="";$("tarotRes").innerHTML='<div class="empty">请先抽牌 ✨</div>';
S.picked=[];
}

// ========================================
// 第七部分：六爻逻辑
// ========================================
function toss(){
if(S.currentYao.length>=6)return;
const coins=[rand(2),rand(2),rand(2)];
const sum=coins.reduce((a,b)=>a+b,0);
let type;
if(sum===3)type="old-yang";
else if(sum===0)type="old-yin";
else if(sum===2)type="yin";
else type="yang";
S.currentYao.push(type);
renderYaoLine(type,S.currentYao.length);
if(S.currentYao.length===6)renderLiuyao();
}

function renderYaoLine(type,num){
const box=$("yaoBox");
const row=document.createElement("div");row.className="yao-bar "+(type.includes("yang")?"yang":"yin");
const mark=document.createElement("span");mark.className="yao-mark";
if(type==="old-yang")mark.textContent="○";
else if(type==="old-yin")mark.textContent="×";
row.appendChild(mark);
const wrap=document.createElement("div");wrap.className="yao-line";
const label=document.createElement("span");label.className="yao-label";
label.textContent=["初","二","三","四","五","上"][num-1]+"爻";
wrap.appendChild(label);wrap.appendChild(row);
box.appendChild(wrap);
$("yaoStatus").textContent=`已掷 ${S.currentYao.length}/6 次`+
(S.currentYao.length===6?" — 卦已成 ✓":"");
}

function resetYao(){
S.currentYao=[];$("yaoBox").innerHTML="";
$("yaoStatus").textContent="点击掷钱，共需 6 次";
$("liuyaoRes").innerHTML='<div class="empty">请先起卦 ✨</div>';
}

function yaoBit(t){return(t==="yang"||t==="old-yang")?"1":"0"}
function changeBit(t){return t==="old-yang"?"0":t==="old-yin"?"1":yaoBit(t)}

function renderLiuyao(){
const ob=S.currentYao.map(yaoBit).join("");
const cb=S.currentYao.map(changeBit).join("");
const mv=[];S.currentYao.forEach((t,i)=>{if(t.startsWith("old"))mv.push(i+1)});
const oGua=GUA64[ob];const cGua=GUA64[cb];
const oName=oGua?oGua.name:"未知卦（"+ob+"）";
const cName=cb===ob?"（不变）":(cGua?cGua.name:"未知卦（"+cb+"）");
const q=$("lQ").value.trim();
let html=`<h3>☯ 六爻起卦结果</h3>`;
if(q)html+=`<p><span class="tag">问题</span>${esc(q)}</p>`;
html+=`<p><span class="tag">本卦</span><strong>${oName}</strong></p>`;
if(oGua)html+=`<p style="font-size:.85rem;color:var(--muted)">${oGua.gua}</p>`;
html+=`<p><span class="tag tag-rose">变卦</span><strong>${cName}</strong></p>`;
if(cGua&&cb!==ob)html+=`<p style="font-size:.85rem;color:var(--muted)">${cGua.gua}</p>`;
html+=`<p><span class="tag tag-blue">动爻</span>`;
html+=mv.length?`第 ${mv.join("、")} 爻</p>`:"静卦，无动爻</p>";
// 爻辞
if(oGua){
html+=`<h4 style="margin-top:16px">📜 本卦爻辞</h4>`;
const names=["初爻","二爻","三爻","四爻","五爻","上爻"];
oGua.yao.forEach((y,i)=>{
const isMv=mv.includes(i+1);
html+=`<p style="font-size:.82rem;${isMv?'color:var(--rose);font-weight:600':''}">`;
html+=`${names[i]}：${y}${isMv?" ★动":""}</p>`;
});
}
// 综合
let summary=`本卦「${oName}」`;
if(oGua)summary+=`，卦辞：${oGua.gua}`;
if(mv.length)summary+=`。变卦「${cName}」，动爻在第${mv.join("、")}爻，需重点关注变动趋势。`;
else summary+=`。此为静卦，局势短期内趋于稳定，守正为上。`;
html+=`<div class="card" style="margin-top:14px"><h3>✨ 综合判断</h3><p>${summary}</p></div>`;
$("liuyaoRes").innerHTML=html;
saveToHistory({type:"liuyao",q,oName,cName,mv,time:nowStr()});
}

// ========================================
// 第八部分：历史记录
// ========================================
function nowStr(){return new Date().toLocaleString("zh-CN")}

function saveToHistory(item){
S.history.unshift(item);
if(S.history.length>50)S.history.length=50;
localStorage.setItem("sa_hist",JSON.stringify(S.history));
renderHist();
}

function renderHist(){
const list=S.history;
$("histCount").textContent=`共 ${list.length} 条记录`;
if(!list.length){$("histList").innerHTML='<div class="empty">暂无记录 📭</div>';return}
let html="";
list.forEach((item,i)=>{
if(item.type==="tarot"){
html+=`<div class="card hist-item">
<div style="display:flex;justify-content:space-between;align-items:center">
<h3>🃏 塔罗占卜</h3><span style="font-size:.72rem;color:var(--muted)">${item.time}</span></div>
${item.q?`<p><span class="tag">问题</span>${esc(item.q)}</p>`:""}
<p>${item.cards.map(c=>`${c.pos}·${c.name}${c.rev?"逆":""}`).join(" / ")}</p>
</div>`;
}else{
html+=`<div class="card hist-item">
<div style="display:flex;justify-content:space-between;align-items:center">
<h3>☯ 六爻起卦</h3><span style="font-size:.72rem;color:var(--muted)">${item.time}</span></div>
${item.q?`<p><span class="tag">问题</span>${esc(item.q)}</p>`:""}
<p><span class="tag">本卦</span>${item.oName} → <span class="tag tag-rose">变卦</span>${item.cName}</p>
<p><span class="tag tag-blue">动爻</span>${item.mv.length?item.mv.join("、"):"无"}</p>
</div>`;
}
});
$("histList").innerHTML=html;
}

function clearHist(){
if(!confirm("确定清空所有记录？"))return;
S.history=[];localStorage.removeItem("sa_hist");renderHist();
}

// ========================================
// 第九部分：初始化
// ========================================
function init(){
const savedTheme=localStorage.getItem("sa_theme");
if(savedTheme==="light"){document.body.classList.add("light-mode");S.theme="light";$("themeBtn").textContent="☀️"}
const savedUser=localStorage.getItem("sa_user");
if(savedUser)S.user=savedUser;
const savedHist=localStorage.getItem("sa_hist");
if(savedHist)try{S.history=JSON.parse(savedHist)}catch(e){}
updateGreet();dailyGuide();renderHist();initParticles();
}
init();
</script>
