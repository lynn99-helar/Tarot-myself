<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九天玄法 - 旗舰版</title>
    <style>
        :root { --bg: #F4F1EB; --ink: #1A1814; --gold: #C8A96E; --paper: #FDFAF4; --acc: #8B6F47; }
        body { background: var(--bg); color: var(--ink); font-family: serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* 扇形牌阵 */
        #fan-area { position: relative; width: 100%; height: 300px; margin-top: 50px; display: none; perspective: 1000px; }
        .fan-card { position: absolute; width: 60px; height: 100px; left: calc(50% - 30px); background: #1a1a1a; border: 1px solid var(--gold); border-radius: 4px; transform-origin: center 250%; transition: all 0.3s; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .fan-card:hover { transform: rotate(var(--r)) translateY(-20px) !important; z-index: 100; }
        .fan-card.picked { opacity: 0; transform: scale(0); pointer-events: none; }

        /* 牌阵展示 */
        .spread { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .card-unit { text-align: center; width: 80px; }
        .card-img { width: 70px; height: 110px; background: #eee; border-radius: 4px; margin-bottom: 5px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; transition: 0.6s; }
        .card-img.rev { transform: rotate(180deg); }
        .card-name { font-size: 12px; font-weight: bold; color: var(--acc); }

        /* 答案之书 */
        #book-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .book-content { background: var(--paper); padding: 40px; border-radius: 4px 15px 15px 4px; text-align: center; width: 280px; box-shadow: -10px 0 20px rgba(0,0,0,0.5); }

        /* 金钱卦 */
        .gua-area { background: var(--paper); padding: 20px; border-radius: 12px; border: 1px solid #ddd; width: 100%; max-width: 350px; margin-top: 20px; }
        .yao-line { width: 100px; height: 10px; background: #333; margin: 5px auto; position: relative; }
        .yao-line.yin::after { content: ''; position: absolute; left: 40%; width: 20%; height: 100%; background: var(--paper); }

        .btn { background: var(--ink); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>神秘占卜助手</h2>
    <p style="font-size: 14px; color: #666;">塔罗牌阵 | 答案之书 | 金钱卦</p>

    <div id="main-ui">
        <textarea id="question" placeholder="输入你的问题..." style="width: 100%; height: 60px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;"></textarea>
        <button class="btn" onclick="startTarot()">推开塔罗牌阵</button>
        <button class="btn" style="background:#8b4513" onclick="showBook()">翻开答案之书</button>
        <button class="btn" style="background:#556b2f" onclick="showGua()">进入金钱卦模式</button>
    </div>

    <div id="fan-area"></div>

    <div id="result-area">
        <div class="spread" id="spread-box"></div>
        <div id="ai-reading" style="font-size: 14px; line-height: 1.6; color: #444; padding: 15px; background: #fff; border-radius: 8px; display: none;"></div>
    </div>

    <div id="book-overlay" onclick="this.style.display='none'">
        <div class="book-content" onclick="event.stopPropagation()">
            <div id="book-text" style="font-size: 1.2rem; margin: 30px 0; min-height: 50px;">心中默念，然后翻开...</div>
            <button class="btn" onclick="openBookPage()">翻开此页</button>
            <button class="btn" style="background:none; color:#999;" onclick="document.getElementById('book-overlay').style.display='none'">关闭</button>
        </div>
    </div>

    <script>
        const TAROT_LIST = ["愚者","魔术师","女祭司","女皇","皇帝","教皇","恋人","战车","力量","隐士","轮转","正义","倒吊","死神","节制","恶魔","高塔","星星","月亮","太阳","审判","世界"];
        const ANSWERS = ["是的，正是时候","现在不宜行动","换个思路会更好","保持耐心，结果自现","你需要一个帮手","答案就在你心中","去问问身边最信任的人","风险过大，暂缓执行"];
        let pickedCount = 0;

        function startTarot() {
            const area = document.getElementById('fan-area');
            area.innerHTML = '';
            area.style.display = 'block';
            pickedCount = 0;
            document.getElementById('spread-box').innerHTML = '';
            for(let i=0; i<22; i++) {
                const r = -60 + (i * 120 / 21);
                const card = document.createElement('div');
                card.className = 'fan-card';
                card.style.setProperty('--r', r + 'deg');
                card.style.transform = `rotate(${r}deg)`;
                card.onclick = function() {
                    if(pickedCount >= 3) return;
                    this.classList.add('picked');
                    addCardToSpread(i);
                    pickedCount++;
                    if(pickedCount === 3) setTimeout(()=>area.style.display='none', 600);
                };
                area.appendChild(card);
            }
        }

        function addCardToSpread(id) {
            const box = document.getElementById('spread-box');
            const name = TAROT_LIST[Math.floor(Math.random()*22)];
            const isRev = Math.random() > 0.7;
            box.innerHTML += `
                <div class="card-unit">
                    <div class="card-img ${isRev?'rev':''}">
                        <img src="https://api.placeholder.com/70/110?text=Card" style="width:100%">
                    </div>
                    <div class="card-name">${name}${isRev?'(逆)':'(正)'}</div>
                </div>`;
        }

        function showBook() { document.getElementById('book-overlay').style.display='flex'; document.getElementById('book-text').innerText='心中默念，然后翻开...'; }
        function openBookPage() { document.getElementById('book-text').innerText = ANSWERS[Math.floor(Math.random()*ANSWERS.length)]; }

        function showGua() {
            alert("金钱卦模式：点击确定模拟起卦。");
            // 这里可以接入具体的掷硬币动画
        }
    </script>
</body>
</html>
