<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵性祭坛 · 专业版</title>
    <style>
        /* --- 视觉与 UI 规范 --- */
        :root {
            --gold: #C8A96E;
            --rose: #C4786A;
            --blue: #5B7FA6;
            /* 浅色模式 */
            --bg: #F4F1EB;
            --paper: #FDFAF4;
            --ink: #1A1814;
            --shadow: rgba(26, 24, 20, 0.1);
            --radius: 20px;
        }

        .dark-mode {
            --bg: #111009;
            --paper: #1A1712;
            --ink: #EDE9E1;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--ink);
            transition: background 0.5s ease;
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- 顶部问候 --- */
        header {
            padding: 20px;
            text-align: left;
            z-index: 10;
        }

        .greeting { font-size: 1.2rem; font-weight: 600; margin: 0; }
        .date-info { font-size: 0.8rem; opacity: 0.7; }

        /* --- 核心内容区 --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 80px; /* 为导航留空 */
        }

        /* --- 物理隔离的抽牌桌 --- */
        #deal-wrap {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .pick-header { padding: 20px; text-align: center; }

        /* 扇形牌桌 */
        #d-slots {
            flex: 1;
            position: relative;
            overflow: hidden;
            perspective: 1000px;
        }

        .dc {
            position: absolute;
            bottom: -50px;
            left: 50%;
            width: 80px;
            height: 140px;
            background: var(--gold);
            border-radius: 8px;
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s;
            box-shadow: 0 4px 10px var(--shadow);
            border: 2px solid #fff;
            cursor: pointer;
        }

        .dc:hover { transform: translateY(-20px) rotate(var(--angle)) !important; z-index: 200; }
        .dc.selected { border-color: var(--rose); box-shadow: 0 0 15px var(--rose); }

        /* --- 底部导航 --- */
        nav {
            position: fixed;
            bottom: 0; width: 100%; max-width: 480px;
            height: 70px;
            background: var(--paper);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -2px 10px var(--shadow);
            border-radius: 20px 20px 0 0;
            z-index: 50;
        }

        .nav-item { font-size: 0.7rem; text-align: center; color: var(--ink); opacity: 0.6; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: bold; }

        /* --- 按钮样式 --- */
        .btn-fill {
            background: var(--gold);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        /* 六爻绘制区 */
        .liuyao-canvas {
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            margin: 20px 0;
        }
        .yao { height: 10px; background: #ddd; position: relative; }
        .yao.yang { background: var(--ink); }
        .yao.yin { background: transparent; border-top: 10px dashed var(--ink); }
        .cf-rev-mark { color: var(--rose); font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="app-container">
    <section id="view-home">
        <header>
            <p class="date-info" id="current-date"></p>
            <h1 class="greeting" id="welcome-msg">您好</h1>
        </header>
        <main>
            <div style="text-align: center; margin-top: 50px;">
                <button class="btn-fill" onclick="openDealer('tarot')">开始塔罗占卜</button>
                <div style="margin-top: 20px;">
                    <button class="btn-fill" style="background: var(--blue);" onclick="switchTab('liuyao')">古法六爻</button>
                </div>
            </div>
        </main>
    </section>

    <section id="view-liuyao" style="display:none;">
        <main>
            <h2>古法六爻金钱卦</h2>
            <div class="liuyao-canvas" id="yao-container"></div>
            <button class="btn-fill" onclick="tossCoins()">掷钱 (掷6次)</button>
            <div id="liuyao-result"></div>
        </main>
    </section>

    <div id="deal-wrap">
        <div class="pick-header">
            <h3 id="pick-title">请静心思考你的问题，抽取 3 张牌</h3>
            <p id="pick-count">已选择: 0/3</p>
        </div>
        <div id="d-slots"></div>
        <div style="padding: 20px; text-align: center;">
            <button class="btn-fill" onclick="confirmSelection()">确认解读</button>
            <button onclick="closeDealer()" style="background:none; border:none; color:var(--ink); margin-left: 10px;">取消</button>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home')">首页</div>
        <div class="nav-item" onclick="switchTab('tarot')">塔罗</div>
        <div class="nav-item" onclick="switchTab('liuyao')">六爻</div>
        <div class="nav-item" onclick="switchTab('history')">记录</div>
        <div class="nav-item" onclick="toggleTheme()">主题</div>
    </nav>
</div>

<script>
    /* --- 核心引擎代码 --- */

    const state = {
        user: '访客',
        theme: 'light',
        pickedCards: [],
        maxPick: 3,
        currentYao: []
    };

    // 初始化
    function init() {
        updateTime();
        loadUser();
    }

    function updateTime() {
        const now = new Date();
        const hours = now.getHours();
        let greet = "深夜好";
        if (hours >= 5 && hours < 12) greet = "早上好";
        else if (hours >= 12 && hours < 18) greet = "下午好";
        else if (hours >= 18 && hours < 23) greet = "晚上好";
        
        document.getElementById('welcome-msg').innerText = `${greet}, ${state.user}`;
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    // 扇形牌桌生成
    function openDealer(type) {
        const wrap = document.getElementById('deal-wrap');
        const slot = document.getElementById('d-slots');
        wrap.style.display = 'flex';
        slot.innerHTML = '';
        state.pickedCards = [];
        
        const totalCards = 22; // 简化版演示：只用大阿
        const radius = 220;
        const startAngle = -55;
        const endAngle = 55;
        const step = (endAngle - startAngle) / (totalCards - 1);

        for(let i=0; i<totalCards; i++) {
            const angle = startAngle + (i * step);
            const card = document.createElement('div');
            card.className = 'dc';
            card.style.setProperty('--angle', `${angle}deg`);
            card.style.transform = `translateX(-50%) rotate(${angle}deg) translateY(-${radius}px)`;
            card.onclick = () => selectCard(card, i, angle);
            slot.appendChild(card);
        }
    }

    function selectCard(el, idx, angle) {
        if (el.classList.contains('selected')) return;
        if (state.pickedCards.length >= state.maxPick) return;

        el.classList.add('selected');
        state.pickedCards.push(idx);
        document.getElementById('pick-count').innerText = `已选择: ${state.pickedCards.length}/${state.maxPick}`;
        
        // 入场动画效果：单独弹出
        el.style.transform = `translateX(-50%) rotate(${angle}deg) translateY(-${260}px) scale(1.1)`;
    }

    function closeDealer() {
        document.getElementById('deal-wrap').style.display = 'none';
    }

    // 六爻模拟逻辑
    function tossCoins() {
        if (state.currentYao.length >= 6) {
            state.currentYao = [];
            document.getElementById('yao-container').innerHTML = '';
        }

        // 模拟三枚硬币：0为反，1为正
        const coins = [Math.round(Math.random()), Math.round(Math.random()), Math.round(Math.random())];
        const sum = coins.reduce((a, b) => a + b, 0); 
        // 3正(3)=老阳○, 0正(0)=老阴×, 2正(2)=少阴--, 1正(1)=少阳—
        let type = '';
        if(sum === 3) type = 'old-yang';
        else if(sum === 0) type = 'old-yin';
        else if(sum === 2) type = 'yin';
        else type = 'yang';

        state.currentYao.push(type);
        renderYao(type);
    }

    function renderYao(type) {
        const container = document.getElementById('yao-container');
        const yao = document.createElement('div');
        yao.className = `yao ${type.includes('yang') ? 'yang' : 'yin'}`;
        if(type.startsWith('old')) {
            const mark = document.createElement('span');
            mark.className = 'cf-rev-mark';
            mark.innerText = type === 'old-yang' ? ' ○' : ' ×';
            yao.appendChild(mark);
        }
        container.appendChild(yao);
    }

    // 视图切换
    function switchTab(view) {
        document.querySelectorAll('section').forEach(s => s.style.display = 'none');
        document.getElementById(`view-${view}`).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        // 逻辑：对应导航高亮
    }

    // 主题切换
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        state.theme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
    }

    function loadUser() {
        const saved = localStorage.getItem('spirit_altar_user');
        if(saved) state.user = saved;
        updateTime();
    }

    init();
</script>

</body>
</html>
