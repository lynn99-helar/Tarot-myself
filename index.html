<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>灵性祭坛 · 视觉增强版</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');
    
    :root {
      --gold: #D4AF37;
      --rose: #E55A6C;
      --blue: #4A90E2;
      --purple: #8E44AD;
      --bg: linear-gradient(135deg, #F5F7FA 0%, #C3CFE2 100%);
      --paper: rgba(255,255,255,0.25);
      --glass: rgba(255,255,255,0.1);
      --ink: #2C3E50;
      --shadow: 0 8px 32px rgba(31,38,135,0.37);
      --shadow-neon: 0 0 20px rgba(212,175,55,0.5);
      --radius: 24px;
    }

    .dark-mode {
      --bg: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
      --paper: rgba(26,32,44,0.6);
      --glass: rgba(26,32,44,0.4);
      --ink: #ECF0F1;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 0;
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--ink);
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      overflow-x: hidden;
      backdrop-filter: blur(10px);
    }

    #app-container {
      width: 100%; max-width: 500px; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }

    /* 粒子背景 */
    #particles {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1;
    }

    header { padding: 24px 20px 16px; text-align: left; z-index: 10; backdrop-filter: blur(20px); }
    .greeting { font-size: 1.4rem; font-weight: 700; margin: 0 0 8px 0; background: linear-gradient(45deg, var(--gold), var(--rose)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .date-info { font-size: 0.85rem; opacity: 0.8; margin: 0; }

    main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

    .glass-card {
      background: var(--glass); backdrop-filter: blur(20px); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.18);
      padding: 24px; margin-bottom: 20px; transform: translateZ(0);
      transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
    }
    .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

    .btn-magic {
      background: linear-gradient(45deg, var(--gold), var(--rose));
      color: white; border: none; padding: 14px 28px; border-radius: 50px;
      font-size: 1rem; font-weight: 600; cursor: pointer; position: relative;
      overflow: hidden; box-shadow: 0 8px 24px rgba(212,175,55,0.4);
      transition: all 0.3s;
    }
    .btn-magic::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
    .btn-magic:hover::before { left: 100%; }
    .btn-magic:active { transform: scale(0.96); }

    /* 抽牌桌增强 */
    #deal-wrap {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at center, rgba(212,175,55,0.1) 0%, transparent 70%), var(--bg);
      z-index: 1000; display: none; flex-direction: column;
      animation: fadeIn 0.4s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .pick-header { padding: 20px; text-align: center; }
    .pick-header h3 { margin: 0; color: var(--gold); }
    .pick-header p { margin: 10px 0 0 0; font-size: 0.9rem; opacity: 0.8; }

    #d-slots {
      flex: 1;
      position: relative;
      overflow: hidden;
      perspective: 1000px;
    }

    .dc {
      position: absolute;
      bottom: -60px;
      left: 50%;
      width: 90px;
      height: 150px;
      background: linear-gradient(145deg, #FFECB3, #D4AF37);
      border-radius: 16px;
      transform-origin: bottom center;
      transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      border: 3px solid rgba(255,255,255,0.9);
      cursor: pointer;
      perspective: 1000px;
      user-select: none;
    }
    .dc-inner { transition: transform 0.6s; transform-style: preserve-3d; height: 100%; }
    .dc.flipped .dc-inner { transform: rotateY(180deg); }
    .dc-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; padding: 10px; font-size: 0.8rem; text-align: center; }
    .dc-back { background: linear-gradient(145deg, #FFECB3, #D4AF37); color: #8B6914; }
    .dc-front { background: linear-gradient(145deg, #667eea 0%, #764ba2 100%); color: white; transform: rotateY(180deg); }

    .dc.selected .dc-front { border: 2px solid var(--rose); }

    /* 结果展示 */
    .tarot-spread { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin: 20px 0; }
    .tarot-card { animation: cardRise 0.6s cubic-bezier(0.23,1,0.32,1); }
    @keyframes cardRise { from { opacity: 0; transform: translateY(30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
    
    .card-result-item { background: var(--glass); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .card-result-title { font-weight: bold; color: var(--gold); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .card-result-meaning { font-size: 0.9rem; line-height: 1.5; }
    .reversed-tag { background: var(--rose); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }

    /* 导航 */
    nav {
      position: fixed; bottom: 0; width: 100%; max-width: 500px; height: 80px;
      background: var(--glass); backdrop-filter: blur(20px);
      display: flex; justify-content: space-around; align-items: center;
      box-shadow: var(--shadow); border-radius: var(--radius) var(--radius) 0 0; z-index: 50;
    }
    .nav-item { font-size: 0.8rem; text-align: center; color: var(--ink); opacity: 0.7; cursor: pointer; transition: 0.3s; }
    .nav-item.active { opacity: 1; color: var(--gold); text-shadow: 0 0 10px var(--shadow-neon); transform: scale(1.1); }

    /* 其他样式 */
    .music-toggle { position: fixed; top: 20px; right: 20px; z-index: 100; background: var(--glass); border-radius: 50%; width: 50px; height: 50px; border: none; cursor: pointer; font-size: 1.2rem; }
    .today-fortune { animation: glow 2s infinite alternate; }
    @keyframes glow { 0% { box-shadow: 0 0 20px rgba(212,175,55,0.3); } 100% { box-shadow: 0 0 30px rgba(212,175,55,0.6); } }
    
    .history-item { background: var(--paper); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--line); }
    .history-time { font-size: 0.75rem; opacity: 0.6; margin-bottom: 8px; }
    .history-content { font-size: 0.9rem; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <button class="music-toggle" onclick="toggleMusic()">🎵</button>

  <div id="app-container">
    <!-- 首页 -->
    <section id="view-home">
      <header>
        <p class="date-info" id="current-date"></p>
        <h1 class="greeting" id="welcome-msg">您好</h1>
      </header>
      <main>
        <div class="glass-card today-fortune">
          <h3>今日运势</h3>
          <p id="daily-fortune">加载中...</p>
        </div>
        <div class="glass-card">
          <label for="username-input">称呼</label>
          <input id="username-input" placeholder="请输入你的名字或称呼" style="width:100%; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.3); margin-top:8px; color:var(--ink);">
          <div style="margin-top:12px;">
            <button class="btn-fill" onclick="saveUser()">保存称呼</button>
          </div>
        </div>
        <div style="text-align:center; margin-top: 30px;">
          <button class="btn-fill" onclick="prepareTarot()">开始塔罗占卜</button>
          <div style="margin-top: 20px;">
            <button class="btn-fill" style="background: var(--blue);" onclick="switchTab('liuyao')">古法六爻</button>
          </div>
        </div>
      </main>
    </section>

    <!-- 塔罗 -->
    <section id="view-tarot" style="display:none;">
      <main>
        <div class="glass-card">
          <h2>塔罗三牌占卜</h2>
          <p class="subtle">可先输入问题，再进入抽牌。默认三张牌位：过去 / 现在 / 未来。</p>
          <textarea id="tarot-question" placeholder="请输入你想要占卜的问题" style="width:100%; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.3); margin-top:8px; min-height:80px; color:var(--ink);"></textarea>
          <div style="margin-top:12px;" class="row">
            <button class="btn-fill" onclick="openDealer('tarot')">进入抽牌</button>
            <button class="btn-outline" onclick="clearTarotResult()">清空结果</button>
          </div>
        </div>
        <div id="tarot-result" class="glass-card">
          <div class="empty">尚未完成抽牌。</div>
        </div>
      </main>
    </section>

    <!-- 六爻 -->
    <section id="view-liuyao" style="display:none;">
      <main>
        <div class="glass-card">
          <h2>古法六爻金钱卦</h2>
          <p class="subtle">每次点击掷钱生成一爻，共 6 次成卦。自下而上为初爻至上爻。</p>
          <textarea id="liuyao-question" placeholder="请输入你想问的问题" style="width:100%; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.3); margin-top:8px; min-height:60px; color:var(--ink);"></textarea>
          <div class="liuyao-canvas" id="yao-container" style="margin:20px 0;"></div>
          <div class="row">
            <button class="btn-fill" onclick="tossCoins()">掷钱</button>
            <button class="btn-outline" onclick="resetLiuyao()">重新起卦</button>
          </div>
        </div>
        <div id="liuyao-result" class="glass-card">
          <div class="empty">尚未成卦。</div>
        </div>
      </main>
    </section>

    <!-- 记录 -->
    <section id="view-history" style="display:none;">
      <main>
        <div class="glass-card">
          <div class="row" style="justify-content: space-between; align-items:center;">
            <h2 style="margin-bottom:0;">记录</h2>
            <button class="btn-outline" onclick="clearHistory()">清空记录</button>
          </div>
        </div>
        <div id="history-list"></div>
      </main>
    </section>

    <!-- 抽牌桌 -->
    <div id="deal-wrap">
      <div class="pick-header">
        <h3 id="pick-title">请静心思考你的问题，抽取 3 张牌</h3>
        <p id="pick-count">已选择: 0/3</p>
      </div>
      <div id="d-slots"></div>
      <div style="padding: 20px; text-align: center;">
        <button class="btn-fill" onclick="confirmSelection()">确认解读</button>
        <button onclick="closeDealer()" style="background:none; border:none; color:var(--ink); margin-left:10px; font-size:1rem; cursor:pointer;">取消</button>
      </div>
    </div>

    <!-- 导航栏 -->
    <nav>
      <div class="nav-item active" data-view="home" onclick="switchTab('home')">首页</div>
      <div class="nav-item" data-view="tarot" onclick="switchTab('tarot')">塔罗</div>
      <div class="nav-item" data-view="liuyao" onclick="switchTab('liuyao')">六爻</div>
      <div class="nav-item" data-view="history" onclick="switchTab('history')">记录</div>
      <div class="nav-item" onclick="toggleTheme()">主题</div>
    </nav>
  </div>

    // 粒子特效
    function initParticles() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const particles = [];
      const numParticles = 50;
      
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: Math.random() * 0.5 + 0.5,
          life: Math.random() * 0.5 + 0.5
        });
      }
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.life * 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(212,175,55,${p.life})`;
          ctx.fill();
          p.x += p.vx; 
          p.y -= p.vy; 
          p.life -= 0.005;
          if (p.y < 0 || p.life < 0) {
            p.y = canvas.height; 
            p.x = Math.random() * canvas.width; 
            p.life = 1;
          }
        });
        requestAnimationFrame(animate);
      }
      animate();
    }

    // ========== 塔罗逻辑 ==========
    function prepareTarot() {

    function openDealer(type) {
      state.currentDealerType = type;
      state.pickedCards = [];
      state.pickedCardData = [];
      document.getElementById("pick-count").innerText = `已选择: 0/${state.maxPick}`;
      const wrap = document.getElementById("deal-wrap");
      const slot = document.getElementById("d-slots");
      wrap.style.display = "flex";
      slot.innerHTML = "";
      
      const totalCards = TAROT_DECK.length;
      const radius = 220;
      const startAngle = -55;
      const endAngle = 55;
      const step = (endAngle - startAngle) / (totalCards - 1);

      for (let i = 0; i < totalCards; i++) {
        const angle = startAngle + (i * step);
        const card = document.createElement("div");
        card.className = "dc";
        card.style.setProperty("--angle", `${angle}deg`);
        card.style.transform = `translateX(-50%) rotate(${angle}deg) translateY(-${radius}px)`;
        card.dataset.index = i;
        card.onclick = () => selectCard(card);
        slot.appendChild(card);
      }
    }

    function selectCard(el) {
      if (el.classList.contains("selected")) return;
      if (state.pickedCards.length >= state.maxPick) return;
      if (navigator.vibrate) navigator.vibrate(20);

      el.classList.add("selected");
      const idx = parseInt(el.dataset.index);
      state.pickedCards.push(idx);
      document.getElementById("pick-count").innerText = `已选择: ${state.pickedCards.length}/${state.maxPick}`;
      
      // 翻牌动画
      const inner = document.createElement("div");
      inner.className = "dc-inner";
      const back = document.createElement("div");
      back.className = "dc-face dc-back";
      back.innerHTML = "✦";
      const front = document.createElement("div");
      front.className = "dc-face dc-front";
      front.innerHTML = TAROT_DECK[idx].name;
      inner.appendChild(back);
      inner.appendChild(front);
      el.innerHTML = "";
      el.appendChild(inner);
      
      setTimeout(() => {
        el.classList.add("flipped");
      }, 10);
    }

    function closeDealer() {
      document.getElementById("deal-wrap").style.display = "none";
    }

    function confirmSelection() {
      if (state.currentDealerType !== "tarot") return;
      if (state.pickedCards.length !== state.maxPick) {
        alert(`请先选择 ${state.maxPick} 张牌。`);
        return;
      }

      const positions = ["过去", "现在", "未来"];
      const selected = state.pickedCards.map((idx, i) => {
        const base = TAROT_DECK[idx];
        const reversed = Math.random() < 0.35;
        return {
          ...base,
          reversed,
          position: positions[i],
          meaning: reversed ? base.reversed : base.upright
        };
      });

      state.pickedCardData = selected;
      renderTarotResult(selected);
      saveHistory({
        type: "tarot",
        question: document.getElementById("tarot-question").value.trim(),
        result: selected,
        time: new Date().toLocaleString("zh-CN")
      });

      closeDealer();
      switchTab("tarot");
      vibrate([100, 50, 100]);
    }

    function renderTarotResult(cards) {
      const question = document.getElementById("tarot-question").value.trim();
      const box = document.getElementById("tarot-result");
      let html = `<h3>本次塔罗解读</h3>`;
      if (question) html += `<p style="margin-bottom:16px;"><strong>问题：</strong>${escapeHtml(question)}</p>`;
      
      html += `<div class="tarot-spread">`;
      cards.forEach((card, i) => {
        html += `
          <div class="card-result-item tarot-card" style="animation-delay:${i*0.2}s">
            <div class="card-result-title">
              ${card.position} 
              ${card.reversed ? '<span class="reversed-tag">逆位</span>' : ''}
            </div>
            <div style="font-weight:bold; color:var(--gold); margin-bottom:8px;">${card.name}</div>
            <div class="card-result-meaning">${card.meaning}</div>
          </div>
        `;
      });
      html += `</div>`;
      
      // 综合解读
      const summary = generateTarotSummary(cards, question);
      html += `<div class="card-result-item" style="margin-top:16px;">
        <div class="card-result-title">综合指引</div>
        <div class="card-result-meaning">${summary}</div>
      </div>`;
      
      box.innerHTML = html;
    }

    function generateTarotSummary(cards, question) {
      const reverseCount = cards.filter(c => c.reversed).length;
      let mood = "整体能量较为顺畅，事情有推进空间。";
      if (reverseCount === 1) mood = "局势存在一处明显阻滞，需要修正认知或节奏。";
      if (reverseCount >= 2) mood = "当前阻力较多，建议放慢判断，先处理内在与现实失衡。";
      
      let q = question ? `围绕“${escapeHtml(question)}”来看，` : "整体来看，";
      return `${q}${mood} 从三张牌的信息看，${cards[0].name}代表过去的基础，${cards[1].name}反映现在的状态，${cards[2].name}预示未来的走向。建议先理解过去形成的模式，再根据现在的真实处境调整行动。`;
    }

      if (state.currentYao.length >= 6) return;
      if (navigator.vibrate) navigator.vibrate(30);

      const coins = [Math.round(Math.random()), Math.round(Math.random()), Math.round(Math.random())];
      const sum = coins.reduce((a, b) => a + b, 0);

      let type = "";
      if (sum === 3) type = "old-yang";
      else if (sum === 0) type = "old-yin";
      else if (sum === 2) type = "yin";
      else type = "yang";

      state.currentYao.push(type);
      renderYao(type);

      if (state.currentYao.length === 6) {
        renderLiuyaoResult();
      }
    }

    function renderYao(type) {
      const container = document.getElementById("yao-container");
      const yao = document.createElement("div");
      yao.className = `yao ${type.includes("yang") ? "yang" : "yin"}`;
      yao.style.width = "100%";
      yao.style.height = "12px";
      yao.style.marginBottom = "8px";
      yao.style.borderRadius = "6px";
      
      if (type.includes("yang")) {
        yao.style.background = "var(--ink)";
      } else {
        yao.style.background = `linear-gradient(to right, var(--ink) 0 45%, transparent 45% 55%, var(--ink) 55% 100%)`;
      }

      if (type.startsWith("old")) {
        const mark = document.createElement("span");
        mark.className = "cf-rev-mark";
        mark.innerText = type === "old-yang" ? " ○" : " ×";
        mark.style.marginLeft = "10px";
        mark.style.color = "var(--rose)";
        yao.appendChild(mark);
      }
      container.appendChild(yao);
    }

    function resetLiuyao() {
      state.currentYao = [];
      document.getElementById("yao-container").innerHTML = "";
      document.getElementById("liuyao-result").innerHTML = `<div class="empty">尚未成卦。</div>`;
    }

    function yaoToBit(type) {
      return (type === "yang" || type === "old-yang") ? "1" : "0";
    }

    function changedYaoBit(type) {
      if (type === "old-yang") return "0";
      if (type === "old-yin") return "1";
      return yaoToBit(type);
    }

    function renderLiuyaoResult() {
      const originalBits = state.currentYao.map(yaoToBit).join("");
      const changedBits = state.currentYao.map(changedYaoBit).join("");
      const movingLines = state.currentYao
        .map((t, i) => t.startsWith("old") ? i + 1 : null)
        .filter(Boolean);

      // 查找卦象
      let originalName = "未知卦";
      let changedName = "未知卦";
      
      for (const [name, data] of Object.entries(GUA_DATA)) {
        if (data.binary === originalBits) originalName = name;
        if (data.binary === changedBits) changedName = name;
      }

      const detail = GUA_DATA[originalName];
      const changedDetail = GUA_DATA[changedName];
      const question = document.getElementById("liuyao-question").value.trim();
      const movingText = movingLines.length ? `动爻：第 ${movingLines.join("、")} 爻` : "无动爻（静卦）";

      let html = `<h3>起卦结果</h3>`;
      if (question) html += `<p style="margin-bottom:12px;"><strong>问题：</strong>${escapeHtml(question)}</p>`;
      
      html += `
        <div style="margin-bottom:16px;">
          <div><strong>本卦：</strong>${originalName} (${originalBits})</div>
          <div class="subtle">${detail.judgment}</div>
        </div>
      `;

      if (movingLines.length > 0) {
        html += `
          <div style="margin-bottom:16px;">
            <div><strong>变卦：</strong>${changedName} (${changedBits})</div>
            <div class="subtle">${changedDetail.judgment}</div>
          </div>
        `;
      }

      html += `<div style="margin-bottom:16px;"><strong>${movingText}</strong></div>`;
      
      // 显示动爻辞
      if (movingLines.length > 0) {
        html += `<div style="margin-bottom:16px;"><strong>动爻辞：</strong><br>`;
        movingLines.forEach(lineNum => {
          html += `${lineNum}爻：${detail.lines[lineNum-1]}<br>`;
        });
        html += `</div>`;
      }

      // 综合判断
      const summary = generateLiuyaoSummary(originalName, changedName, movingLines);
      html += `<div style="margin-top:16px; padding:12px; background:rgba(212,175,55,0.1); border-radius:12px;">
        <strong>综合判断：</strong> ${summary}
      </div>`;

      document.getElementById("liuyao-result").innerHTML = html;
      
      saveHistory({
        type: "liuyao",
        question,
        result: { originalName, changedName, originalBits, changedBits, movingLines },
        time: new Date().toLocaleString("zh-CN")
      });
      
      vibrate([50, 100, 50]);
    }

    function generateLiuyaoSummary(original, changed, moving) {
      if (moving.length === 0) {
        return `得${original}卦，为静卦，象征事物发展相对稳定，目前状态与最终结果一致。建议顺应当前趋势，保持现状或按部就班推进。`;
      }
      return `由${original}卦变${changed}卦，说明事情正在发展变化中。动爻提示关键变化点，需重点关注。${moving.length === 1 ? "单爻动，变化明确。" : "多爻动，变化剧烈。"}建议结合本卦与变卦的卦辞，灵活应对。`;
    }

    // ========== 历史记录 ==========
    function saveHistory(item) {
      const list = JSON.parse(localStorage.getItem("spirit_altar_history") || "[]");
      list.unshift(item);
      localStorage.setItem("spirit_altar_history", JSON.stringify(list.slice(0, 50)));
      renderHistory();
    }

    function renderHistory() {
      const list = JSON.parse(localStorage.getItem("spirit_altar_history") || "[]");
      const wrap = document.getElementById("history-list");
      if (!wrap) return;

      if (!list.length) {
        wrap.innerHTML = `<div class="glass-card empty">暂无记录。</div>`;
        return;
      }

      wrap.innerHTML = list.map(item => {
        if (item.type === "tarot") {
          return `
            <div class="history-item">
              <div class="history-time">${item.time}</div>
              <div class="history-content">
                <strong>塔罗占卜</strong><br>
                ${item.question ? `<div class="subtle">问题：${escapeHtml(item.question)}</div>` : ""}
                <div>${item.result.map(x => `${x.position}·${x.name}${x.reversed ? "逆位" : "正位"}`).join(" / ")}</div>
              </div>
            </div>
          `;
        } else {
          return `
            <div class="history-item">
              <div class="history-time">${item.time}</div>
              <div class="history-content">
                <strong>六爻起卦</strong><br>
                ${item.question ? `<div class="subtle">问题：${escapeHtml(item.question)}</div>` : ""}
                <div>本卦：${item.result.originalName}</div>
                <div>变卦：${item.result.changedName}</div>
                <div>动爻：${item.result.movingLines.length ? item.result.movingLines.join("、") : "无"}</div>
              </div>
            </div>
          `;
        }
      }).join("");
    }

    function clearHistory() {
      if (!confirm("确定清空所有记录吗？")) return;
      localStorage.removeItem("spirit_altar_history");
      renderHistory();
      vibrate(200);
    }

    // 音乐
    let audioCtx;
    function toggleMusic() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        oscillator.connect(audioCtx.destination);
        oscillator.start();
        this.innerText = "🔇";
      } else {
        audioCtx.close();
        audioCtx = null;
        this.innerText = "🎵";
      }
      vibrate(50);
    }

    // 工具函数
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[s]));
    }

    function vibrate(pattern) {
      if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // 启动
    init();
  </script>
</body>
</html>
