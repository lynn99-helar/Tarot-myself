    <style>
        /* ================= 基础变量与主题 ================= */
        :root {
            --gold: #C8A96E;
            --gold-dark: #A68A56;
            --max-width: 480px;
            --font-main: 'Noto Serif SC', serif;
            --font-eng: 'IM Fell English', serif;
        }
        body.light-theme {
            --bg-color: #F4F1EB;
            --text-color: #2C2A25;
            --card-bg: #FFFFFF;
            --border-color: rgba(0,0,0,0.1);
        }
        body.dark-theme {
            --bg-color: #111009;
            --text-color: #E8E6E1;
            --card-bg: #1A1914;
            --border-color: rgba(255,255,255,0.1);
        }

        /* ================= 全局重置 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        #app-container {
            width: 100%;
            max-width: var(--max-width);
            min-height: 100vh;
            position: relative;
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        /* ================= 导航与按钮 ================= */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: var(--max-width);
            height: 60px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            font-size: 14px;
            color: var(--text-color);
            opacity: 0.6;
            cursor: pointer;
            padding: 10px;
        }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: bold; }
        .btn-fill {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            font-family: var(--font-main);
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .btn-fill:hover { background: var(--gold-dark); }
        .view-section { display: none; padding: 20px; padding-bottom: 80px; flex: 1; overflow-y: auto;}
        .view-section.active { display: block; }

        /* ================= 选牌桌 (扇形) ================= */
        #deal-wrap {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: flex-end;
            overflow: hidden;
        }
        .deal-prompt { position: absolute; top: 20%; color: var(--gold); font-size: 20px; text-align: center; width: 100%;}
        #d-slots { position: relative; width: 100%; height: 250px; bottom: -20px; }
        .dc {
            position: absolute; width: 50px; height: 85px;
            background: #2a2a2a; border: 2px solid #444; border-radius: 4px;
            bottom: 0; left: 50%; transform-origin: bottom center;
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.5);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.05) 5px, rgba(255,255,255,0.05) 10px);
        }
        .dc:hover { transform: translateY(-15px) scale(1.1) !important; border-color: var(--gold); z-index: 99 !important; }
        .dc.selected { opacity: 0; pointer-events: none; }

        /* ================= 牌面展示与动画 ================= */
        .card-display-area { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px;}
        .card-container { width: 100px; height: 170px; perspective: 1000px; cursor: pointer; }
        .card-inner {
            width: 100%; height: 100%; transition: transform 0.6s;
            transform-style: preserve-3d; position: relative;
        }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }
        .card-container.reversed.flipped .card-inner { transform: rotateY(180deg) rotateZ(180deg); }
        .card-front, .card-back {
            width: 100%; height: 100%; position: absolute; backface-visibility: hidden;
            border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .card-back {
            background: #2a2a2a repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.05) 5px, rgba(255,255,255,0.05) 10px);
            border: 2px solid var(--gold);
        }
        .card-front {
            background: var(--card-bg); border: 1px solid var(--border-color);
            transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .card-img { width: 90%; height: 75%; object-fit: contain; }
        .card-name-label { font-size: 10px; margin-top: 5px; text-align: center; }
        .cf-rev-mark { color: red; font-size: 12px; font-weight: bold; } /* 解决历史Bug: cf-rev-mark */

        /* ================= 答案之书 ================= */
        #book-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 300; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .book-wrapper {
            background: var(--card-bg); width: 100%; max-width: 400px; padding: 30px;
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border: 2px solid var(--gold); position: relative;
        }
        /* 解决历史Bug类名 */
        .book-content { font-size: 20px; line-height: 1.6; margin: 20px 0; font-style: italic; }
        .book-divider { width: 50px; height: 2px; background: var(--gold); margin: 10px auto; }
        .book-pg-num { position: absolute; bottom: 10px; right: 15px; font-family: var(--font-eng); opacity: 0.5; }
        <div id="book-breathe" style="display:none;">
                <h3 style="color:var(--gold); margin-bottom: 20px;">深呼吸，默念你的问题</h3>
                <div class="breathe-circle"></div>
                <div class="countdown-text" id="book-countdown">3</div>
            </div>
        .book-fold { position: absolute; top: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 30px 30px 0; border-color: transparent var(--bg-color) transparent transparent; box-shadow: -2px 2px 5px rgba(0,0,0,0.1); }

        /* ================= AI 对话 ================= */
        .ai-chat-box { margin-top: 20px; border: 1px solid var(--gold); border-radius: 6px; padding: 15px; background: rgba(200, 169, 110, 0.05); }
        .ai-reply { font-size: 14px; line-height: 1.6; white-space: pre-wrap; margin-top: 10px; }
        .loading-dot::after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 40% { color: var(--gold); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 60% { text-shadow: .25em 0 0 var(--gold), .5em 0 0 rgba(0,0,0,0);} 80%, 100% { text-shadow: .25em 0 0 var(--gold), .5em 0 0 var(--gold);}}

        /* 通用输入框 */
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-color); border-radius: 4px;
        }
        .header-title { font-family: var(--font-eng); font-size: 24px; text-align: center; margin-bottom: 20px; color: var(--gold); }
        .record-item { padding: 10px; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; font-size: 14px;}
   /* ================= 新增：返回按钮、动画与居中优化 ================= */
        .btn-back {
            position: absolute; top: 15px; left: 15px; background: transparent; 
            border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px;
            border-radius: 4px; cursor: pointer; z-index: 100;
        }
        /* 选牌桌居中优化 */
        #deal-wrap { justify-content: center; } /* 改为正中间 */
        #d-slots { bottom: 0; margin-top: 40px; }
        .deal-controls { position: absolute; bottom: 30px; width: 80%; display: flex; flex-direction: column; gap: 10px; z-index: 201; }
        .ipt-question { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid var(--gold); background: var(--card-bg); color: var(--text-color); text-align: center;}
        
        /* 答案之书呼吸动画 */
        #book-breathe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 301; border-radius: 8px;}
        .breathe-circle { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, var(--gold) 0%, transparent 70%); animation: breathe 3s infinite ease-in-out; }
        @keyframes breathe { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
        .countdown-text { font-size: 30px; color: var(--gold); font-family: var(--font-eng); margin-top: 20px; font-weight: bold; }
    </style>
</head>

// AI 配置
const AI_CONFIG = {
    url: 'https://api.siliconflow.cn/v1/chat/completions',
    model: 'Qwen/Qwen2.5-7B-Instruct',
    key: 'sk-wpiztvaqxnowxxzevmynvexutwtvywidxzkkqpefsjxihipq' // 用户指定
};

// ================= 核心应用对象 =================
const app = {
    user: null,
    theme: 'light',
    state: {
        mode: '', needCount: 0, selectedCards: [], currentSpreadType: '', isSeason: false,
        tempDeck: [], lastView: 'home', currentQuestion: ''
   if(viewName !== 'result') this.state.lastView = viewName;
    },

    init() {
        this.checkSeason();
        const savedUser = localStorage.getItem('tarot_last_user');
        if (savedUser) {
            document.getElementById('ipt-username').value = savedUser;
        }
    },

    // --- 用户与设置系统 ---
    login() {
        const name = document.getElementById('ipt-username').value.trim();
        if (!name) return alert("请输入昵称！");
        this.user = name;
        localStorage.setItem('tarot_last_user', name);
        
        // 读取用户偏好
        const userPrefs = JSON.parse(localStorage.getItem(`prefs_${name}`) || '{"theme":"light"}');
        this.theme = userPrefs.theme;
        this.applyTheme();
        
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('main-nav').style.display = 'flex';
        this.switchView('home');
        document.getElementById('home-greeting').innerText = `${this.getTimeGreeting()}，${name}`;
        
        const now = new Date();
        const days = ['日','一','二','三','四','五','六'];
        document.getElementById('home-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
    },

    logout() {
        this.user = null;
        document.getElementById('main-nav').style.display = 'none';
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById('view-login').classList.add('active');
    },

    switchTheme() {
        this.theme = this.theme === 'light' ? 'dark' : 'light';
        this.applyTheme();
        if(this.user) {
            localStorage.setItem(`prefs_${this.user}`, JSON.stringify({theme: this.theme}));
        }
    },

    applyTheme() {
        document.body.className = `${this.theme}-theme`;
    },

    getTimeGreeting() {
        const hour = new Date().getHours();
        if(hour < 11) return '早上好';
        if(hour < 14) return '中午好';
        if(hour < 18) return '下午好';
        if(hour < 23) return '晚上好';
        return '深夜好';
    },

    switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        
        const navItems = document.querySelectorAll('.nav-item');
        const viewIndex = ['home', 'tarot', 'lenormand', 'fortune', 'history'].indexOf(viewName);
        if(viewIndex !== -1) navItems[viewIndex].classList.add('active');

        if(viewName === 'history') this.renderHistory();
    },

    // --- 四季牌阵时间检测 ---
    checkSeason() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        // 简易容差判定 (±1天)
        const isSpring = (m === 3 && d >= 19 && d <= 22);
        const isSummer = (m === 6 && d >= 20 && d <= 22);
        const isAutumn = (m === 9 && d >= 22 && d <= 24);
        const isWinter = (m === 12 && d >= 20 && d <= 23);

        this.state.isSeason = isSpring || isSummer || isAutumn || isWinter;
        const btn = document.getElementById('btn-season');
        const msg = document.getElementById('season-lock-msg');
        
        if (!this.state.isSeason) {
            btn.style.opacity = '0.5';
            btn.onclick = () => alert("四季牌阵仅在春分、夏至、秋分、冬至（±1天）开放哦。");
            msg.innerText = "🔒 宇宙能量尚未汇聚，目前未在四立节点。";
        } else {
            msg.innerText = "✨ 节气能量已开启，可进行深度抽牌。";
            msg.style.color = "var(--gold)";
        }
    },

    // --- 抽牌逻辑 (扇形桌) ---
    startSpread(type, count) {
        this.state.currentSpreadType = type;
        this.state.needCount = count;
        this.state.selectedCards = [];
        this.state.mode = type.includes('lenormand') ? 'lenormand' : 'waite';
        this.state.tempDeck = [...CARD_DATA[this.state.mode]]; // 复制牌库，用于不重复抽牌
        
        document.getElementById('ipt-question').value = '';
        document.getElementById('deal-need-count').innerText = count;
        document.getElementById('deal-wrap').style.display = 'flex';
        this.renderFanCards();
    },

    renderFanCards() {
        const slots = document.getElementById('d-slots');
        slots.innerHTML = '';
        const total = this.state.mode === 'waite' ? 78 : 18; // 简化展示，实际应为库长度
        const spreadAngle = 110; // 110度扇形
        const radius = 220; // 虚拟半径

        for (let i = 0; i < total; i++) {
            const card = document.createElement('div');
            card.className = 'dc';
            
            // 计算扇形位置 Math.cos / Math.sin
            const angle = -spreadAngle/2 + (spreadAngle / (total - 1)) * i;
            const radian = angle * (Math.PI / 180);
            
            // 基于底部中心点散开
            const tx = Math.sin(radian) * radius;
            const ty = -Math.cos(radian) * radius + radius; // 向上偏移

            card.style.transform = `translate(${tx}px, ${ty}px) rotate(${angle}deg)`;
            
            card.onclick = (e) => {
                card.classList.add('selected');
                this.handleCardPick(i);
            };
            slots.appendChild(card);
        }
    },

    handleCardPick(index) {
        if (this.state.tempDeck.length === 0) return;
        
        // 从 tempDeck 中随机抽取并移除，确保不重复
        const randIdx = Math.floor(Math.random() * this.state.tempDeck.length);
        const randomCard = this.state.tempDeck.splice(randIdx, 1)[0];
        
        const isReversed = this.state.mode !== 'lenormand' && Math.random() > 0.5;
        this.state.selectedCards.push({ ...randomCard, reversed: isReversed });
        document.getElementById('deal-need-count').innerText = this.state.needCount - this.state.selectedCards.length;

        if (this.state.selectedCards.length >= this.state.needCount) {
            this.state.currentQuestion = document.getElementById('ipt-question').value.trim();
            setTimeout(() => {
                document.getElementById('deal-wrap').style.display = 'none';
                this.showResult();
            }, 300);
        }
        quickPick() {
        const needed = this.state.needCount - this.state.selectedCards.length;
        const availableCards = document.querySelectorAll('.dc:not(.selected)');
        
        for(let i=0; i<needed; i++) {
            if(availableCards[i]) availableCards[i].classList.add('selected');
            // 直接跳过动画调用抽牌
            if (this.state.tempDeck.length > 0) {
                const randIdx = Math.floor(Math.random() * this.state.tempDeck.length);
                const randomCard = this.state.tempDeck.splice(randIdx, 1)[0];
                this.state.selectedCards.push({ ...randomCard, reversed: (this.state.mode !== 'lenormand' && Math.random() > 0.5) });
            }
        }
        this.state.currentQuestion = document.getElementById('ipt-question').value.trim();
        document.getElementById('deal-wrap').style.display = 'none';
        this.showResult();
    },

    cancelDeal() {
        document.getElementById('deal-wrap').style.display = 'none';
    },

    // --- 解读页渲染 ---
    showResult() {
        this.switchView('result');
        document.getElementById('res-title').innerText = "宇宙的启示";
        document.getElementById('res-interpretation').style.display = 'none';
        document.getElementById('btn-reveal-all').style.display = 'inline-block';
        
        const area = document.getElementById('res-cards');
        area.innerHTML = '';
        
        this.state.selectedCards.forEach((card, idx) => {
            const wrap = document.createElement('div');
            // CSS 类名历史 Bug 规避，使用精确 DOM
            wrap.className = `card-container ${card.reversed ? 'reversed' : ''}`;
            wrap.innerHTML = `
                <div class="card-inner">
                    <div class="card-back"></div>
                    <div class="card-front">
                        <div style="font-size: 24px; margin-bottom:10px;">🎴</div>
                        <div class="card-name-label">
                            ${card.name}<br>
                            ${card.reversed ? '<span class="cf-rev-mark">(逆位)</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
            wrap.onclick = () => {
                wrap.classList.add('flipped');
                this.checkAllFlipped();
            };
            area.appendChild(wrap);
        });

        // 保存历史记录
        this.saveHistory();
    },

    revealAllCards() {
        document.querySelectorAll('.card-container').forEach(c => c.classList.add('flipped'));
        this.checkAllFlipped();
    },

    checkAllFlipped() {
        const total = document.querySelectorAll('.card-container').length;
        const flipped = document.querySelectorAll('.card-container.flipped').length;
        if (total === flipped) {
            document.getElementById('btn-reveal-all').style.display = 'none';
            this.generateLocalText();
            document.getElementById('res-interpretation').style.display = 'block';
        }
    },

    generateLocalText() {
        let text = `根据【${this.state.currentSpreadType}】牌阵为您解读：\n\n`;
        this.state.selectedCards.forEach((c, i) => {
            text += `[位置 ${i+1}] ${c.name} ${c.reversed ? '(逆)' : '(正)'}\n`;
            text += `核心牌义：${c.reversed ? c.meaning_rev : c.meaning_up || c.meaning}\n\n`;
        });
        
        // 追加300字以上的模板化深度解读
        text += `🔮 【综合牌面与深度符号学解读】\n`;
        text += `参考《78度的塔罗》中的卡巴拉生命树路径，以及《塔罗葵花宝典》的元素生克法则，本次牌阵展现出一种深层的潜意识流动状态。在塔罗的宏观视角中，每一张牌不仅仅是孤立的事件预示，更是您当下心理能量场的一面镜子。\n\n`;
        text += `首先，从【元素构成】来看，牌面中显现出的元素特质指示着您目前生活中某些能量的积聚或失衡。如果您抽到了火元素（权杖），这代表着行动力的呼唤；水元素（圣杯）要求您正视内心的情感羁绊；风元素（宝剑）提醒您理清思绪，避免精神内耗；土元素（星币）则将焦点拉回现实基础与物质保障。\n\n`;
        text += `其次，从【数字命理学】的角度，牌面数字的进阶暗示了事件的发展阶段。从代表初始的1（王牌）到代表圆满或重负的10，您的牌卡位置揭示了当前问题是处于萌芽期、冲突期还是即将迎来结局的转化期。\n\n`;
        text += `最终建议：塔罗牌是具有共时性的工具，它并非宿命论。正位代表能量的顺畅流动，而逆位并非绝对的厄运，而是内敛、延迟或是过度消耗的警示。请结合您最初默念的问题：“${this.state.currentQuestion || '未知'}”，在接下来的几天里，保持正念与觉知，将牌面的启示转化为您现实生活中的行动指南。记住，命运的最终走向，始终掌握在您自己手中。`;

        document.getElementById('res-local-text').innerText = text;
        document.getElementById('ai-reply-content').innerText = ''; 
        document.getElementById('btn-ask-ai').disabled = false;
        document.getElementById('btn-ask-ai').innerText = "请求 AI 深度解读";
    },

    // --- AI 对话系统 ---
    async askAI() {
        const btn = document.getElementById('btn-ask-ai');
        const replyBox = document.getElementById('ai-reply-content');
        
        btn.disabled = true;
        btn.innerHTML = `灵性能量链接中<span class="loading-dot"></span>`;
        replyBox.innerText = "正在呼唤高维智慧...";

        // 构造 prompt
        let promptStr = `你是一位精通《78度的塔罗》的资深塔罗师。现在用户抽到了以下牌：\n`;
        this.state.selectedCards.forEach(c => {
            promptStr += `- ${c.name} (${c.reversed ? '逆位' : '正位'})\n`;
        });
        promptStr += `请用温暖、同理心但落地的语言，给出一个不少于 300 字的总体深度解读。`;

        try {
            const response = await fetch(AI_CONFIG.url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${AI_CONFIG.key}`
                },
                body: JSON.stringify({
                    model: AI_CONFIG.model,
                    messages: [
                        { role: "system", content: "你是一位专业的心理学塔罗分析师。" },
                        { role: "user", content: promptStr }
                    ],
                    temperature: 0.7
                })
            });

            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const data = await response.json();
            
            if (data.choices && data.choices[0].message) {
                replyBox.innerText = data.choices[0].message.content;
                btn.innerText = "AI 解读完毕";
            } else {
                throw new Error("API 返回格式异常");
            }

        } catch (error) {
            console.error(error);
            replyBox.innerText = `⚠️ 链接失败：${error.message}\n请检查网络或稍后再试。`;
            btn.disabled = false;
            btn.innerText = "重新尝试请求 AI";
        }
    },

    // --- 记录系统 ---
    saveHistory() {
        const key = `history_${this.user}`;
        let history = JSON.parse(localStorage.getItem(key) || '[]');
        history.unshift({
            date: new Date().toLocaleString(),
            type: this.state.currentSpreadType,
            cards: this.state.selectedCards.map(c => `${c.name}${c.reversed? '(逆)':''}`).join(' | ')
        });
        if(history.length > 50) history.pop(); // 仅保留50条
        localStorage.setItem(key, JSON.stringify(history));
    },

    renderHistory() {
        const list = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem(`history_${this.user}`) || '[]');
        
        if (history.length === 0) {
            list.innerHTML = '<p style="text-align:center; opacity:0.5;">暂无抽牌记录</p>';
            return;
        }

        list.innerHTML = history.map(h => `
            <div class="record-item">
                <div style="color:var(--gold); font-size:12px;">${h.date} - ${h.type}</div>
                <div style="margin-top:5px;">抽牌：${h.cards}</div>
            </div>
        `).join('');
    },

    // --- 答案之书 ---
    openBookOfAnswers() {
        document.getElementById('book-modal').style.display = 'flex';
        document.getElementById('book-breathe').style.display = 'flex';
        let count = 3;
        const countEl = document.getElementById('book-countdown');
        countEl.innerText = count;
        
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                countEl.innerText = count;
            } else {
                clearInterval(timer);
                document.getElementById('book-breathe').style.display = 'none';
                this.rollBook();
            }
        }, 1000); // 1秒递减
    },
    
    rollBook() {
        const textEl = document.getElementById('book-text');
        const pgEl = document.getElementById('book-pg');
        textEl.style.opacity = 0;
        
        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * BOOK_ANSWERS.length);
            textEl.innerText = BOOK_ANSWERS[randomIndex];
            pgEl.innerText = `Pg. ${Math.floor(Math.random() * 300) + 1}`;
            textEl.style.opacity = 1;
        }, 300);
    },
        
        setTimeout(() => {
            const randomIndex = Math.floor(Math.random() * BOOK_ANSWERS.length);
            textEl.innerText = BOOK_ANSWERS[randomIndex];
            pgEl.innerText = `Pg. ${Math.floor(Math.random() * 300) + 1}`;
            textEl.style.opacity = 1;
        }, 300);
    }
};
