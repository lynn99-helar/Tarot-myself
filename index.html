<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>灵性祭坛 · 专业版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C8A96E;--rose:#C4786A;--blue:#5B7FA6;--green:#7BA87B;
  --bg:#111009;--paper:#1A1712;--card-bg:#222018;
  --ink:#EDE9E1;--muted:#8A8478;--line:rgba(200,169,110,0.12);
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --r:16px;--rl:20px
}
body.light{
  --bg:#F4F1EB;--paper:#FDFAF4;--card-bg:#F0EBE0;
  --ink:#1A1814;--muted:#7A7468;--line:rgba(26,24,20,0.1);
  --shadow:0 8px 32px rgba(0,0,0,0.08)
}
html,body{height:100%;overflow:hidden}
body{font-family:'PingFang SC','Quicksand','Noto Sans SC',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);transition:background .4s,color .4s}
#nav{display:none;height:auto;min-height:56px;background:var(--paper);border-top:1px solid var(--line);
align-items:center;justify-content:space-around;flex-shrink:0;z-index:50;
border-radius:20px 20px 0 0;
padding:6px 0 calc(6px + env(safe-area-inset-bottom, 0px))}
  /* NAV */
#nav{display:none;height:64px;background:var(--paper);border-top:1px solid var(--line);
  align-items:center;justify-content:space-around;flex-shrink:0;z-index:50;
  border-radius:20px 20px 0 0}
#nav.show{display:flex}
.nav-i{font-size:.65rem;text-align:center;color:var(--muted);cursor:pointer;padding:6px 2px;
  transition:.2s;min-width:48px}
.nav-i .ni{font-size:1.1rem;display:block;margin-bottom:1px}
.nav-i.on{color:var(--gold);font-weight:700}
/* SCREENS */
.scr{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.scr.on{display:flex;flex-direction:column;animation:scrIn .35s ease}
@keyframes scrIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* LOGIN */
#login-scr{align-items:center;justify-content:center;padding:40px 24px;text-align:center}
#login-scr h1{font-size:1.8rem;margin-bottom:4px;
  background:linear-gradient(135deg,var(--gold),var(--rose));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#login-scr .desc{color:var(--muted);font-size:.85rem;margin-bottom:30px}
#login-scr input{max-width:300px;margin-bottom:14px}
#login-scr .btn{width:100%;max-width:300px}
.ulist{max-width:300px;width:100%;margin-top:16px}
.ulist-item{padding:10px 14px;border-radius:10px;cursor:pointer;transition:.2s;
  display:flex;justify-content:space-between;align-items:center;font-size:.85rem;
  background:var(--paper);margin-bottom:6px;border:1px solid var(--line)}
.ulist-item:hover{background:var(--line)}
.ulist-item .del{color:var(--rose);font-size:.75rem;cursor:pointer}
/* HEADER */
.sh{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:flex-start}
.sh h1{font-size:1.2rem;font-weight:700}
.sh .sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.sh .back{background:none;border:none;color:var(--gold);font-size:.85rem;cursor:pointer;padding:4px 8px}
/* CARDS */
.gc{background:var(--paper);border-radius:var(--rl);padding:18px;margin:0 16px 14px;
  border:1px solid var(--line);box-shadow:var(--shadow);transition:.3s}
.gc h3{font-size:.95rem;margin-bottom:8px}
.gc p{font-size:.82rem;line-height:1.7;color:var(--muted)}
.gc p+p{margin-top:6px}
/* INPUT */
input,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);
  background:var(--card-bg);color:var(--ink);font-size:.88rem;outline:none;font-family:inherit;transition:.3s}
input:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:70px;resize:vertical}
select{appearance:none;cursor:pointer}
label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:6px}
/* BUTTONS */
.btn{display:inline-block;padding:12px 24px;border-radius:14px;border:none;font-size:.88rem;
  font-weight:600;cursor:pointer;transition:.3s;font-family:inherit;white-space:nowrap}
.btn:active{transform:scale(.96)}
.bg{background:var(--gold);color:#fff}
.bg2{background:var(--rose);color:#fff}
.bgl{background:var(--blue);color:#fff}
.bgo{background:transparent;color:var(--ink);border:1px solid var(--line)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.68rem;
  background:rgba(200,169,110,.15);color:var(--gold);margin:2px}
.tgr{background:rgba(196,120,106,.15);color:var(--rose)}
.tbl{background:rgba(91,127,166,.15);color:var(--blue)}
/* HOME */
.stat-row{display:flex;gap:10px;margin-top:10px}
.stat-box{flex:1;text-align:center;padding:12px;background:var(--card-bg);border-radius:12px}
.stat-box .num{font-size:1.4rem;font-weight:700;color:var(--gold)}
.stat-box .lbl{font-size:.7rem;color:var(--muted)}
.qbtn{display:block;width:100%;padding:14px;border-radius:14px;border:1px solid var(--line);
  background:var(--paper);color:var(--ink);font-size:.88rem;cursor:pointer;transition:.3s;
  text-align:left;margin-bottom:8px;font-family:inherit}
.qbtn:active{background:var(--line)}
.qbtn .qbi{font-size:1.2rem;margin-right:8px}
/* TAROT */
.spread-sel{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.spread-item{padding:10px;border-radius:12px;border:1px solid var(--line);cursor:pointer;
  text-align:center;font-size:.78rem;transition:.2s;background:var(--paper)}
.spread-item:hover,.spread-item.on{border-color:var(--gold);background:rgba(200,169,110,.08)}
.spread-item .si-n{font-size:1.1rem;font-weight:700;color:var(--gold);display:block}
/* DEALER */
#dealer{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
#dealer.on{display:flex;animation:scrIn .3s}
.dhd{padding:16px 20px;text-align:center;flex-shrink:0}
.dhd h3{font-size:1rem;margin-bottom:4px}
.dhd p{font-size:.78rem;color:var(--muted)}
.dbd{flex:1;position:relative;overflow:hidden;min-height:300px}
.dft{padding:12px 20px;text-align:center;flex-shrink:0}
.dc{position:absolute;bottom:-40px;left:50%;width:70px;height:120px;border-radius:10px;
  transform-origin:bottom center;cursor:pointer;user-select:none;
  transition:transform .4s cubic-bezier(.23,1,.32,1),box-shadow .3s,border-color .2s;
  border:2px solid rgba(255,255,255,.8);
  background:linear-gradient(145deg,#1a1a2e,#16213e);
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;color:var(--gold)}
.dc::before{content:'';position:absolute;inset:6px;border-radius:6px;
  border:1px solid rgba(200,169,110,.3)}
.dc:hover{z-index:20;box-shadow:0 10px 30px rgba(200,169,110,.3)}
.dc.sel{border-color:var(--rose)!important;box-shadow:0 0 20px rgba(196,120,106,.5)!important}
/* REVEAL */
.rv-spread{display:grid;gap:12px;margin:12px 0}
.rv-spread.g3{grid-template-columns:repeat(3,1fr)}
.rv-spread.g1{grid-template-columns:1fr;max-width:200px;margin-left:auto;margin-right:auto}
.rv-spread.g5{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
.rv-spread.g10{grid-template-columns:repeat(auto-fit,minmax(90px,1fr))}
.rv-card{background:var(--paper);border-radius:14px;padding:14px;border:1px solid var(--line);
  box-shadow:var(--shadow);animation:cardUp .5s cubic-bezier(.23,1,.32,1) both;
  cursor:pointer;transition:.3s}
.rv-card:hover{transform:translateY(-3px)}
.rv-card:nth-child(2){animation-delay:.12s}
.rv-card:nth-child(3){animation-delay:.24s}
.rv-card:nth-child(4){animation-delay:.3s}
.rv-card:nth-child(5){animation-delay:.36s}
.rv-card:nth-child(6){animation-delay:.42s}
.rv-card:nth-child(7){animation-delay:.48s}
.rv-card:nth-child(8){animation-delay:.54s}
.rv-card:nth-child(9){animation-delay:.6s}
.rv-card:nth-child(10){animation-delay:.66s}
@keyframes cardUp{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.rv-card .rv-name{font-weight:700;font-size:.85rem;margin-bottom:4px}
.rv-card .rv-pos{font-size:.68rem;color:var(--muted);margin-bottom:6px}
.rv-card .rv-kw{font-size:.75rem;color:var(--gold);font-weight:600}
.rv-card .rv-detail{font-size:.75rem;line-height:1.6;margin-top:8px;display:none;color:var(--muted)}
.rv-card.exp .rv-detail{display:block}
/* YAO */
.yao-row{display:flex;align-items:center;gap:10px;margin:6px 0;animation:slideL .3s both}
@keyframes slideL{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
.yao-bar{flex:1;height:12px;border-radius:6px;background:var(--gold)}
.yao-bar.yin{background:linear-gradient(to right,var(--gold) 0 40%,transparent 40% 60%,var(--gold) 60% 100%)}
.yao-lbl{width:32px;font-size:.7rem;color:var(--muted);text-align:right}
.yao-mk{font-size:.75rem;font-weight:700;color:var(--rose);min-width:16px}
/* AI */
.ai-box{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.ai-box.on{display:flex;animation:scrIn .3s}
.ai-hd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-hd h3{flex:1;font-size:.95rem}
.ai-hd .cls{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
.ai-msgs{flex:1;overflow-y:auto;padding:16px}
.ai-msg{margin-bottom:12px;max-width:85%;animation:cardUp .3s both}
.ai-msg.bot{margin-right:auto}
.ai-msg.user{margin-left:auto;text-align:right}
.ai-msg .bubble{display:inline-block;padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.6}
.ai-msg.bot .bubble{background:var(--paper);border:1px solid var(--line)}
.ai-msg.user .bubble{background:var(--gold);color:#fff}
.ai-msg .bubble.thinking{color:var(--muted)}
.ai-ft{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0}
.ai-ft input{flex:1;border-radius:20px;padding:10px 16px}
.ai-ft .btn{border-radius:20px;padding:10px 16px}
/* BOOK */
#book-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:250;display:none;
  align-items:center;justify-content:center;padding:24px}
#book-overlay.on{display:flex;animation:scrIn .3s}
.book{background:var(--paper);border-radius:20px;max-width:360px;width:100%;max-height:80vh;
  overflow-y:auto;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;
  border:1px solid var(--line)}
.book .pg{font-size:.7rem;color:var(--muted);margin-bottom:8px}
.book .btitle{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:12px}
.book .btext{font-size:.88rem;line-height:1.8;color:var(--ink)}
/* HIST */
.hi-item{animation:cardUp .3s both}
.hi-item .hi-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hi-item .hi-actions{display:flex;gap:6px}
.hi-item .hi-btn{font-size:.7rem;padding:4px 10px;border-radius:8px;border:1px solid var(--line);
  background:none;color:var(--muted);cursor:pointer}
.hi-item .hi-btn:hover{border-color:var(--gold);color:var(--gold)}
/* SET */
.set-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;
  border-bottom:1px solid var(--line)}
.set-item:last-child{border-bottom:none}
.set-item .set-l{font-size:.88rem}
.set-item .set-r{font-size:.82rem;color:var(--muted)}
.toggle{width:48px;height:26px;border-radius:13px;background:var(--line);cursor:pointer;
  position:relative;transition:.3s}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:.3s}
.toggle.on::after{left:25px}
/* SCROLL */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem}
/* UTIL */
.mt{margin-top:12px}.mb{margin-bottom:12px}
.tc{text-align:center}.fw{font-weight:600}
/* BOOK COUNTDOWN */
.book-cd-wrap{position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:10}
.book-cd-num{font-size:5rem;font-weight:700;color:var(--gold);
animation:cdPop .7s cubic-bezier(.23,1,.32,1) both}
.book-cd-label{font-size:.88rem;color:var(--muted);margin-top:8px;letter-spacing:2px}
@keyframes cdPop{0%{transform:scale(2);opacity:0}40%{transform:scale(.9);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes flipOpen{
0%{transform:perspective(800px) rotateY(-120deg) scale(.8);opacity:0}
60%{transform:perspective(800px) rotateY(10deg) scale(1.02);opacity:1}
100%{transform:perspective(800px) rotateY(0) scale(1);opacity:1}}
.book.flip-open{animation:flipOpen .7s cubic-bezier(.23,1,.32,1) both}
@keyframes miniFlip{
0%{transform:perspective(600px) rotateY(90deg);opacity:0}
100%{transform:perspective(600px) rotateY(0);opacity:1}}
.book.mini-flip{animation:miniFlip .45s ease both}
</style>
</head>
<body>
<div id="app">

<!-- ====== LOGIN ====== -->
<div id="login-scr" class="scr on">
  <h1>灵性祭坛</h1>
  <p class="desc">塔罗 · 六爻 · 雷诺曼 · 答案之书</p>
  <input id="login-name" placeholder="请输入昵称" maxlength="20">
  <input id="login-pw" placeholder="密码（可选）" type="password" maxlength="20">
  <button class="btn bg" onclick="doLogin()">进入祭坛</button>
  <div id="user-list" class="ulist"></div>
</div>

<!-- ====== HOME ====== -->
<div id="home-scr" class="scr">
  <div class="sh">
    <div><h1 id="home-greet"></h1><div class="sub" id="home-date"></div></div>
    <button class="back" onclick="goSettings()">⚙️</button>
  </div>
  <div class="gc tc">
    <p id="daily-msg" style="font-size:.9rem;color:var(--gold);font-weight:600"></p>
  </div>
  <div class="gc">
    <div class="stat-row">
      <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">总记录</div></div>
      <div class="stat-box"><div class="num" id="stat-tarot">0</div><div class="lbl">塔罗</div></div>
      <div class="stat-box"><div class="num" id="stat-yao">0</div><div class="lbl">六爻</div></div>
    </div>
  </div>
  <div class="gc">
    <button class="qbtn" onclick="goTab('tarot')"><span class="qbi">🃏</span> 塔罗占卜</button>
    <button class="qbtn" onclick="goTab('fortune')"><span class="qbi">🌟</span> 运势预测</button>
    <button class="qbtn" onclick="goTab('liuyao')"><span class="qbi">☯️</span> 六爻金钱卦</button>
    <button class="qbtn" onclick="openBook()"><span class="qbi">📕</span> 答案之书</button>
    <button class="qbtn" onclick="goTab('lenormand')"><span class="qbi">🎴</span> 雷诺曼占卜</button>
  </div>
</div>

<!-- ====== TAROT ====== -->
<div id="tarot-scr" class="scr">
  <div class="sh"><div><h1>🃏 塔罗占卜</h1><div class="sub">韦特 / 透特 78张完整牌组</div></div>
    <button class="back" onclick="goTab('home')">← 返回</button></div>
  <div class="gc">
    <label>选择牌组</label>
    <select id="deck-sel">
      <option value="waite">韦特塔罗 Rider-Waite</option>
      <option value="thoth">透特塔罗 Thoth</option>
    </select>
    <label class="mt">选择牌阵</label>
    <div class="spread-sel" id="spread-grid"></div>
    <label class="mt">占卜问题（可选）</label>
    <textarea id="t-question" placeholder="例：这段感情接下来会如何发展？"></textarea>
    <div class="row">
      <button class="btn bg" onclick="startTarot()">开始抽牌</button>
      <button class="btn bgo" onclick="clearTarotResult()">清空结果</button>
    </div>
  </div>
  <div id="tarot-result"></div>
</div>

<!-- ====== FORTUNE ====== -->
<div id="fortune-scr" class="scr">
  <div class="sh"><div><h1>🌟 运势预测</h1><div class="sub">日 · 周 · 月 · 年度运势</div></div>
    <button class="back" onclick="goTab('home')">← 返回</button></div>
  <div class="gc">
    <div class="spread-sel" id="fortune-grid"></div>
    <div class="row">
      <button class="btn bg" onclick="startFortune()">抽取运势</button>
    </div>
  </div>
  <div id="fortune-result"></div>
</div>

<!-- ====== LENORMAND ====== -->
<div id="lenormand-scr" class="scr">
  <div class="sh"><div><h1>🎴 雷诺曼占卜</h1><div class="sub">经典 三牌叙事阵</div></div>
    <button class="back" onclick="goTab('home')">← 返回</button></div>
  <div class="gc">
    <label>占卜问题（可选）</label>
    <textarea id="l-question" placeholder="例：这段关系的本质是什么？"></textarea>
    <div class="row">
      <button class="btn bg" onclick="startLenormand()">开始抽牌</button>
    </div>
  </div>
  <div id="lenormand-result"></div>
</div>

<!-- ====== LIUYAO ====== -->
<div id="liuyao-scr" class="scr">
  <div class="sh"><div><h1>☯️ 六爻金钱卦</h1><div class="sub">古法三币起卦 · 64卦完整</div></div>
    <button class="back" onclick="goTab('home')">← 返回</button></div>
  <div class="gc">
    <label>占卜问题（可选）</label>
    <textarea id="y-question" placeholder="例：本月工作变动是否顺利？"></textarea>
    <div id="yao-box" style="margin:16px 0"></div>
    <p id="yao-status" style="font-size:.75rem;color:var(--muted);margin-bottom:10px">掷铜钱起卦，共需 6 次</p>
    <div class="row">
      <button class="btn bgl" onclick="tossCoins()">掷铜钱 🪙</button>
      <button class="btn bgo" onclick="resetYao()">重新起卦</button>
    </div>
  </div>
  <div id="liuyao-result"></div>
</div>

<!-- ====== HISTORY ====== -->
<div id="history-scr" class="scr">
  <div class="sh"><div><h1>📖 占卜记录</h1><div class="sub" id="hist-info"></div></div>
    <button class="back" onclick="goTab('more')">← 返回</button></div>
  <div class="gc tc"><button class="btn bgo" onclick="clearAllHist()">清空全部记录</button></div>
  <div id="hist-list"></div>
</div>

<!-- ====== MORE ====== -->
<div id="more-scr" class="scr">
  <div class="sh"><div><h1>✨ 更多功能</h1></div>
    <button class="back" onclick="goTab('home')">← 返回</button></div>
  <div class="gc">
    <button class="qbtn" onclick="goTab('history')"><span class="qbi">📖</span> 占卜记录</button>
    <button class="qbtn" onclick="goSettings()"><span class="qbi">⚙️</span> 设置</button>
    <button class="qbtn" onclick="openAI()"><span class="qbi">🤖</span> AI 深度对话</button>
  </div>
</div>

<!-- ====== SETTINGS ====== -->
<div id="settings-scr" class="scr">
  <div class="sh"><div><h1>⚙️ 设置</h1></div>
    <button class="back" onclick="goTab('more')">← 返回</button></div>
  <div class="gc">
    <div class="set-item">
      <span class="set-l">深色模式</span>
      <div class="toggle" id="theme-tog" onclick="toggleTheme()"></div>
    </div>
    <div class="set-item">
      <span class="set-l">当前账户</span>
      <span class="set-r" id="cur-user"></span>
    </div>
    <div class="set-item">
      <span class="set-l">默认牌组</span>
      <select id="def-deck" style="width:auto;max-width:140px" onchange="saveDefDeck()">
        <option value="waite">韦特</option><option value="thoth">透特</option>
      </select>
    </div>
    <div class="set-item">
      <span class="set-l">切换账户</span>
      <button class="btn bgo" style="font-size:.78rem;padding:6px 14px" onclick="doLogout()">退出登录</button>
    </div>
  </div>
</div>

// ========== USER ==========
function getUsers(){return JSON.parse(localStorage.getItem('sa_users')||'{}')}
function saveUsers(u){localStorage.setItem('sa_users',JSON.stringify(u))}
function showLogin(){
  S.tab='login';
  $('login-scr').classList.add('on');
  $('nav').classList.remove('show');
  document.querySelectorAll('.scr').forEach(function(s){if(s.id!=='login-scr')s.classList.remove('on')});
  var users=getUsers(),names=Object.keys(users),list=$('user-list');
  if(!names.length){list.innerHTML='';return}
  list.innerHTML='<p style="font-size:.78rem;color:var(--muted);margin-bottom:8px">已有账户：</p>'+
    names.map(function(n){return '<div class="ulist-item" onclick="quickLogin(\''+esc(n)+'\')"><span>'+esc(n)+'</span><span class="del" onclick="event.stopPropagation();delUser(\''+esc(n)+'\')">删除</span></div>'}).join('');
}
function doLogin(){
  var name=$('login-name').value.trim(),pw=$('login-pw').value;
  if(!name){alert('请输入昵称');return}
  var users=getUsers();
  if(users[name]&&users[name]!==pw){alert('密码错误');return}
  users[name]=pw||'';saveUsers(users);loginUser(name);
}
function quickLogin(name){var users=getUsers();if(users[name]){loginUser(name);$('login-name').value=name}}
function delUser(name){
  if(!confirm('删除账户 '+name+' 的所有数据？'))return;
  var users=getUsers();delete users[name];saveUsers(users);
  localStorage.removeItem('sa_'+name+'_hist');localStorage.removeItem('sa_'+name+'_deck');showLogin();
}
function loginUser(name){
  S.user=name;localStorage.setItem('sa_current_user',name);loadUserData();
  $('login-scr').classList.remove('on');$('nav').classList.add('show');goTab('home');
}

  var deck=S.deck==='thoth'?TH:WA,total=deck.length,fanAngle=110,startA=-fanAngle/2,step=fanAngle/Math.max(total-1,1);
  var rad=Math.min(220,innerWidth*0.5);body.style.height=(rad+80)+'px';
  for(var i=0;i<total;i++){
    var a=startA+i*step,el=document.createElement('div');
    el.className='dc';el.style.transform='translateX(-50%) rotate('+a+'deg) translateY(-'+rad+'px)';
    el.dataset.i=i;el.innerHTML='<span style="opacity:.4">✦</span>';
(function(cardEl,idx,ang){cardEl.addEventListener('click',function(){pickDC(cardEl,idx,ang,rad,count)})})(el,i,a);    body.appendChild(el);
  }
  $('dealer').classList.add('on');
}
function pickDC(el,i,a,rad,max){
  if(el.classList.contains('sel')||S.picked.length>=max)return;
  el.classList.add('sel');S.picked.push(i);
  $('d-count').textContent='已选 '+S.picked.length+'/'+max+' 张';
  el.style.transform='translateX(-50%) rotate('+a+'deg) translateY(-'+(rad+30)+'px) scale(1.08)';
  if(navigator.vibrate)navigator.vibrate(25);
  if(S.picked.length===max)setTimeout(function(){confirmDealer()},400);
}
function closeDealer(){$('dealer').classList.remove('on')}
function confirmDealer(){
  var spDef=SPREADS[S.spread]||FORTUNES[S.spread];
  if(!spDef){return}
  if(S.picked.length!==spDef.n){alert('请选满 '+spDef.n+' 张牌');return}
  var deck=S.deck==='thoth'?TH:WA;
  var cards=S.picked.map(function(idx,i){
    var base=deck[idx],rev=Math.random()<0.35;
    return{name:base[0],suit:base[1],num:base[2],kw:base[3],pos:spDef.pos[i]||'位置'+(i+1),rev,love:rev?base[5]:base[4],career:rev?base[7]:base[6]};
  });
  closeDealer();
  if(S.dealerType==='tarot')renderTarotResult(cards,spDef);
  else if(S.dealerType==='fortune')renderFortuneResult(cards,spDef);
  else if(S.dealerType==='lenormand')renderLenormandResult(cards);

// ========== I CHING ==========
var YAO_POS=['初爻','二爻','三爻','四爻','五爻','上爻'];
function tossCoins(){
  if(S.yaoResult.length>=6)return;
  var c=[Math.random()<.5?0:1,Math.random()<.5?0:1,Math.random()<.5?0:1],sum=c[0]+c[1]+c[2];
  var type,yang,sym;
  if(sum===3){type='老阳';yang=true;sym='○'}
  else if(sum===0){type='老阴';yang=false;sym='×'}
  else if(sum===2){type='少阴';yang=false;sym='- -'}
  else{type='少阳';yang=true;sym='—'}
  S.yaoResult.push({type:type,yang:yang,sym:sym});
  renderYaoLine(S.yaoResult.length-1);
  if(S.yaoResult.length===6)setTimeout(renderLiuyao,300);
}
function renderYaoLine(i){
  var y=S.yaoResult[i],box=$('yao-box'),row=document.createElement('div');
  row.className='yao-row';
  row.innerHTML='<span class="yao-lbl">'+YAO_POS[i]+'</span><div class="yao-bar'+(y.yang?'':' yin')+'">'+(y.type.indexOf('老')===0?'<span class="yao-mk">'+y.sym+'</span>':'')+'</div><span style="font-size:.7rem;color:var(--muted);min-width:36px">'+y.type+'</span>';
  box.appendChild(row);
  $('yao-status').textContent='已掷 '+S.yaoResult.length+'/6 次'+(S.yaoResult.length===6?' — 卦已成 ✓':'');
}
function resetYao(){S.yaoResult=[];$('yao-box').innerHTML='';$('yao-status').textContent='掷铜钱起卦，共需 6 次';$('liuyao-result').innerHTML=''}
function yaoBit(y){return y.yang?'1':'0'}
function changeBit(y){return y.type==='老阳'?'0':y.type==='老阴'?'1':yaoBit(y)}
function getTrigram(bits){var m={'111':0,'110':1,'101':2,'100':3,'011':4,'010':5,'001':6,'000':7};return m[bits]||0}
function renderLiuyao(){
  var obits=S.yaoResult.map(yaoBit).join(''),cbits=S.yaoResult.map(changeBit).join('');
  var upperO=obits.substring(0,3),lowerO=obits.substring(3,6);
  var upperC=cbits.substring(0,3),lowerC=cbits.substring(3,6);
  var ui=getTrigram(upperO),li=getTrigram(lowerO),oName=GUA_NAME[ui][li];
  var ci=obits===cbits?'（不变）':GUA_NAME[getTrigram(upperC)][getTrigram(lowerC)];
  var oCI=GUA_CI[ui]?GUA_CI[ui][li]:'',oKw=GUA_YAO_KW[ui]?GUA_YAO_KW[ui][li]:null;
  var rootElem=TELEM[li],moving=[];
  S.yaoResult.forEach(function(y,i){if(y.type.indexOf('老')===0)moving.push(i)});
  var elWuxing=['木','火','土','金','水'];
  function calcRel(root,yao){
    if(root===yao)return'兄弟';
    var ri=elWuxing.indexOf(root),yi=elWuxing.indexOf(yao);
    if(yi===-1)return'兄弟';
    if(elWuxing[(yi+1)%5]===root)return'父母';
    if(elWuxing[(ri+1)%5]===yao)return'子孙';
    if(elWuxing[(yi+2)%5]===root)return'官鬼';
    if(elWuxing[(ri+2)%5]===yao)return'妻财';
    return'兄弟';
  }
  var sixRel=S.yaoResult.map(function(y,i){return calcRel(rootElem,TELEM[getTrigram(i<3?lowerO:upperO)])});
  var q=$('y-question').value.trim();
  var html='<div class="gc"><h3>☯️ 起卦结果</h3>';
  if(q)html+='<p><span class="tag">问题</span>'+esc(q)+'</p>';html+='</div>';
  html+='<div class="gc"><h3>本卦：'+esc(oName)+'</h3>';
  if(oCI)html+='<p style="font-size:.82rem;color:var(--gold)">'+esc(oCI)+'</p>';
  html+='<p style="font-size:.78rem;color:var(--muted)">上'+TNAME[ui]+'下'+TNAME[li]+'</p></div>';
  html+='<div class="gc"><h3>六爻排盘</h3>';
  for(var i=5;i>=0;i--){
    var y=S.yaoResult[i],isMv=moving.indexOf(i)>=0;
    html+='<div class="yao-row"><span class="yao-lbl">'+YAO_POS[i]+'</span><div class="yao-bar'+(y.yang?'':' yin')+'">'+(isMv?'<span class="yao-mk">'+y.sym+'</span>':'')+'</div><span style="font-size:.72rem;min-width:80px"><span class="tag">'+sixRel[i]+'</span>'+(isMv?'<span class="tag tgr">动</span>':'')+'</span></div>';
    if(oKw&&oKw[i])html+='<p style="font-size:.75rem;color:var(--muted);margin:0 0 6px 42px">'+esc(oKw[i])+'</p>';
  }
  html+='</div>';
  if(obits!==cbits)html+='<div class="gc"><h3>变卦：'+esc(ci)+'</h3><p style="font-size:.78rem;color:var(--muted)">动爻在第'+moving.map(function(i){return i+1}).join('、')+'爻</p></div>';
  else html+='<div class="gc"><p>静卦，无动爻。局势稳定。</p></div>';
  var summary='本卦「'+oName+'」';if(oCI)summary+='，卦辞：'+oCI;
  if(moving.length)summary+='。有'+moving.length+'个动爻，重点关注第'+moving.map(function(i){return i+1}).join('、')+'爻。变卦「'+ci+'」。';
  else summary+='。静卦，守正为佳。';
  html+='<div class="gc"><h3>✨ 综合判断</h3><p>'+summary+'</p></div>';
  html+='<div class="gc tc"><button class="btn bg" onclick="saveToHist(\'liuyao\')">💾 保存记录</button> <button class="btn bgo" onclick="openAIWith(\'liuyao\')">🤖 AI解读</button></div>';
  $('liuyao-result').innerHTML=html;
  S._lastResult={type:'liuyao',oName:oName,cName:ci,moving:moving.map(function(i){return i+1}),summary:summary};
}

// ========== BOOK ==========
var _bookTimer=null;
function openBook(){
  if(_bookTimer){clearInterval(_bookTimer);_bookTimer=null}
  $('book-card').style.display='none';
  $('book-cd').style.display='flex';
  $('cd-num').textContent='3';
  $('book-overlay').classList.add('on');
  var count=3;
  // 重新触发动画
  var numEl=$('cd-num');
  numEl.style.animation='none';numEl.offsetHeight;numEl.style.animation='';
  _bookTimer=setInterval(function(){
    count--;
    if(count>0){
      numEl.textContent=count;
      numEl.style.animation='none';numEl.offsetHeight;
      numEl.style.animation='cdPop .7s cubic-bezier(.23,1,.32,1) both';
    }else{
      clearInterval(_bookTimer);_bookTimer=null;
      $('book-cd').style.display='none';
      var p=BOOK[Math.floor(Math.random()*BOOK.length)];
      showBookPage(p);
      var card=$('book-card');
      card.style.display='';
      card.classList.remove('flip-open');card.offsetHeight;
      card.classList.add('flip-open');
    }
  },800);
}
function flipBook(){
  var card=$('book-card');
  card.classList.remove('mini-flip');card.offsetHeight;
  var p=BOOK[Math.floor(Math.random()*BOOK.length)];
  showBookPage(p);
  card.classList.add('mini-flip');
}
function closeBook(){
  if(_bookTimer){clearInterval(_bookTimer);_bookTimer=null}
  $('book-overlay').classList.remove('on');
  $('book-card').classList.remove('flip-open','mini-flip');
}

// ========== AI ==========
var AI_KEY='sk-wpiztvaqxnowxxzevmynvexutwtvywidxzkkqpefsjxihipq';
var AI_URL='https://api.siliconflow.cn/v1/chat/completions';
var AI_MODEL='Qwen/Qwen2.5-7B-Instruct';
function openAI(){S.aiMessages=[];$('ai-msgs').innerHTML='';addAIMsg('bot','你好，我是灵性祭坛的AI解读助手。你可以问我关于塔罗、六爻、雷诺曼的问题。');$('ai-box').classList.add('on')}
function openAIWith(type){
  openAI();if(!S._lastResult)return;var ctx='',r=S._lastResult;
  if(type==='tarot'||type==='fortune'||type==='season'){ctx='我刚做了一次'+r.spread+'，';if(r.question)ctx+='问题是「'+r.question+'」，';ctx+='抽到的牌是：'+r.cards.map(function(c){return c.name+(c.rev?'逆位':'正位')}).join('、')+'。请帮我深度解读。'}
  else if(type==='liuyao'){ctx='我刚起了一卦，本卦「'+r.oName+'」，变卦「'+r.cName+'」'+(r.moving.length?'，动爻第'+r.moving.join('、')+'爻':'')+'。请帮我深度解读。'}
  if(ctx){$('ai-input').value=ctx;sendAI()}
}
function closeAI(){$('ai-box').classList.remove('on')}
function addAIMsg(role,text){var msgs=$('ai-msgs'),div=document.createElement('div');div.className='ai-msg '+role;div.innerHTML='<div class="bubble">'+esc(text)+'</div>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;return div}
async function sendAI(){
  var input=$('ai-input'),text=input.value.trim();if(!text)return;input.value='';
  addAIMsg('user',text);S.aiMessages.push({role:'user',content:text});
  var thinking=addAIMsg('bot','思考中...');thinking.querySelector('.bubble').classList.add('thinking');
  try{
    var resp=await fetch(AI_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AI_KEY},body:JSON.stringify({model:AI_MODEL,messages:[{role:'system',content:'你是灵性祭坛的AI解读助手，精通塔罗牌、六爻、雷诺曼。解读务实，少意象，多实际建议。用中文。简洁有深度。'}].concat(S.aiMessages),max_tokens:1024,temperature:0.7})});
    thinking.remove();
    if(!resp.ok){var err=await resp.text();addAIMsg('bot','请求失败：'+(resp.status===402?'余额不足':resp.status===401?'API Key无效':'网络错误('+resp.status+')'));return}
    var data=await resp.json(),reply=data.choices[0].message.content;
    addAIMsg('bot',reply);S.aiMessages.push({role:'assistant',content:reply});
  }catch(e){thinking.remove();addAIMsg('bot','网络连接失败：'+e.message)}
}
