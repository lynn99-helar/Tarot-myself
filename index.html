<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>灵性祭坛 · 专业版</title>
    <style>
        /* ================= 视觉规范 ================= */
        :root {
            --gold: #C8A96E;
            --rose: #C4786A;
            --blue: #5B7FA6;
            --bg: #F4F1EB;
            --paper: #FDFAF4;
            --ink: #1A1814;
            --line: rgba(26, 24, 20, 0.1);
            --radius: 20px;
            --shadow: rgba(26, 24, 20, 0.15);
        }
        .dark-mode {
            --bg: #111009;
            --paper: #1A1712;
            --ink: #EDE9E1;
            --line: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.5);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: 'PingFang SC', 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 0.5s;
        }
        #app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .view {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .view.active { display: flex; }

        /* --- 通用样式 --- */
        header { padding: 20px; text-align: left; z-index: 10; }
        .greeting { font-size: 1.2rem; font-weight: 600; margin: 0; }
        .date-info { font-size: 0.8rem; opacity: 0.7; margin: 4px 0 0 0; }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .btn-fill {
            background: var(--gold);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .btn-fill:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            color: var(--ink);
            border: 1px solid var(--line);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
        }
        .card-box {
            background: var(--paper);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px var(--shadow);
            border: 1px solid var(--line);
        }
        .subtle { opacity: 0.7; font-size: 0.9rem; }

        /* --- 底部导航 --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            height: 70px;
            background: var(--paper);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -2px 10px var(--shadow);
            border-radius: 20px 20px 0 0;
            z-index: 50;
            border-top: 1px solid var(--line);
        }
        .nav-item {
            font-size: 0.7rem;
            text-align: center;
            color: var(--ink);
            opacity: 0.6;
            cursor: pointer;
            padding: 6px 8px;
            transition: all 0.2s;
        }
        .nav-item.active { opacity: 1; color: var(--gold); font-weight: bold; }

        /* --- 抽牌桌 --- */
        #deal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .deal-header {
            padding: 20px;
            text-align: center;
            background: var(--paper);
            border-bottom: 1px solid var(--line);
        }
        .deal-title { margin: 0 0 8px 0; color: var(--gold); font-size: 1.1rem; }
        .deal-count { margin: 0; font-size: 0.9rem; opacity: 0.8; }

        #deal-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            perspective: 1000px;
            background: radial-gradient(circle at center, rgba(200,169,110,0.05) 0%, transparent 60%);
        }
        .deal-card {
            position: absolute;
            bottom: -80px;
            left: 50%;
            width: 80px;
            height: 120px;
            background: linear-gradient(145deg, #D4AF37, #C8A96E);
            border-radius: 10px;
            transform-origin: bottom center;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s;
            box-shadow: 0 6px 12px var(--shadow);
            border: 2px solid rgba(255,255,255,0.9);
            cursor: pointer;
            user-select: none;
        }
        .deal-card::before {
            content: "✦";
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            font-size: 1.5rem;
        }
        .deal-card.selected {
            transform: translateX(-50%) translateY(-150px) scale(1.1) !important;
            border-color: var(--rose);
            box-shadow: 0 0 20px var(--rose);
            z-index: 10;
        }
        .deal-card:hover {
            transform: translateX(-50%) translateY(-20px) rotate(var(--angle)) !important;
            z-index: 5;
        }

        .deal-footer {
            padding: 20px;
            text-align: center;
            background: var(--paper);
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* --- 结果展示 --- */
        .result-item {
            background: var(--paper);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--line);
        }
        .result-title { font-weight: bold; color: var(--gold); margin-bottom: 8px; }
        .reversed-tag { color: var(--rose); font-size: 0.8rem; margin-left: 6px; }
        .result-meaning { font-size: 0.95rem; line-height: 1.6; color: var(--ink); }

        /* --- 六爻绘制 --- */
        .yao-container {
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            margin: 20px 0;
            align-items: center;
        }
        .yao {
            width: 100%;
            max-width: 280px;
            height: 10px;
            position: relative;
            border-radius: 5px;
        }
        .yao.yang { background: var(--ink); }
        .yao.yin {
            background:
                linear-gradient(to right,
                    var(--ink) 0 42%,
                    transparent 42% 58%,
                    var(--ink) 58% 100%);
        }
        .yao-mark {
            position: absolute;
            right: -18px;
            top: -2px;
            font-size: 0.7rem;
            color: var(--rose);
        }

        /* --- 答案之书 --- */
        .book-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 320px;
            background: var(--paper);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
        }
        .book-modal.show { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        .book-cover {
            background: linear-gradient(145deg, #8B4513, #A0522D);
            padding: 30px 20px;
            text-align: center;
            border-radius: 20px 20px 0 0;
            color: #fff;
        }
        .book-content {
            padding: 20px;
            text-align: center;
        }
        .book-close { margin-top: 15px; padding: 10px 20px; background: var(--gold); border: none; border-radius: 20px; color: #fff; cursor: pointer; }

        /* --- AI 聊天 --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: fadeIn 0.3s;
        }
        .chat-user { align-self: flex-end; background: var(--gold); color: #fff; border-bottom-right-radius: 4px; }
        .chat-ai { align-self: flex-start; background: var(--paper); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--line);
        }
        .chat-input-area input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg); outline: none; }
        .chat-input-area button { background: var(--gold); color: #fff; border: none; padding: 12px 20px; border-radius: 20px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app">
        <!-- View: Login -->
        <div id="view-login" class="view active">
            <header>
                <p class="date-info">欢迎来到灵性祭坛</p>
                <h1 class="greeting">登录 / 创建账号</h1>
            </header>
            <main>
                <div class="card-box">
                    <input type="text" id="input-name" placeholder="输入你的昵称" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); margin-bottom:10px;">
                    <input type="password" id="input-pass" placeholder="可选：设置密码" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); margin-bottom:15px;">
                    <button class="btn-fill" onclick="login()" style="width:100%;">进入祭坛</button>
                </div>
                <p class="subtle" style="text-align:center; margin-top:20px;">数据保存在本地，换设备需重新登录</p>
            </main>
        </div>

        <!-- View: Home -->
        <div id="view-home" class="view">
            <header>
                <p class="date-info" id="home-date"></p>
                <h1 class="greeting" id="home-greeting">加载中...</h1>
            </header>
            <main>
                <div class="card-box">
                    <h3>今日运势</h3>
                    <div id="daily-fortune" class="subtle">今日宜：静心冥想，宜：整理思绪。今日忌：急躁行事，忌：盲目跟风。</div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-fill" onclick="openDealer('tarot', 'single')">每日一牌</button>
                    <button class="btn-fill" style="background:var(--blue);" onclick="openDealer('tarot', 'three')">三牌阵</button>
                    <button class="btn-fill" style="background:var(--rose);" onclick="openBook()">答案之书</button>
                    <button class="btn-outline" onclick="switchView('liuyao')">古法六爻</button>
                </div>
                <div class="card-box">
                    <h3>我的状态</h3>
                    <p class="subtle">累计占卜次数: <span id="stat-count">0</span></p>
                    <button class="btn-outline" onclick="logout()">切换账号</button>
                </div>
            </main>
        </div>

        <!-- View: Tarot -->
        <div id="view-tarot" class="view">
            <header>
                <p class="date-info">塔罗占卜</p>
                <h1 class="greeting">请选择牌阵</h1>
            </header>
            <main>
                <div class="card-box">
                    <h3>基础牌阵</h3>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;">
                        <button class="btn-outline" onclick="openDealer('tarot', 'single')">单牌指引</button>
                        <button class="btn-outline" onclick="openDealer('tarot', 'three')">过去-现在-未来</button>
                        <button class="btn-outline" onclick="openDealer('tarot', 'yesno')">是否决策</button>
                    </div>
                </div>
                <div class="card-box">
                    <h3>进阶牌阵</h3>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;">
                        <button class="btn-outline" onclick="openDealer('tarot', 'celtic')">凯尔特十字(10)</button>
                        <button class="btn-outline" onclick="openDealer('tarot', 'love')">关系和谐</button>
                        <button class="btn-outline" onclick="openDealer('tarot', 'career')">事业规划</button>
                    </div>
                </div>
                <div class="card-box">
                    <h3>运势牌阵</h3>
                    <div style="display:flex; flex-wrap:wrap; gap:8px;">
                        <button class="btn-outline" onclick="openDealer('tarot', 'daily')">日运势</button>
                        <button class="btn-outline" onclick="openDealer('tarot', 'weekly')">周运势</button>
                        <button class="btn-outline" onclick="openDealer('tarot', 'monthly')">月运势</button>
                    </div>
                </div>
            </main>
        </div>

        <!-- View: Liuyao -->
        <div id="view-liuyao" class="view">
            <header>
                <p class="date-info">古法六爻金钱卦</p>
                <h1 class="greeting">请静心思考问题</h1>
            </header>
            <main>
                <div class="card-box">
                    <textarea id="liuyao-question" placeholder="在此输入你想占卜的问题..." style="width:100%; min-height:80px; padding:12px; border-radius:10px; border:1px solid var(--line); background:var(--bg); resize:none; outline:none;"></textarea>
                    <button class="btn-fill" onclick="startLiuyao()" style="width:100%; margin-top:15px;">开始起卦</button>
                </div>
                <div class="card-box">
                    <h3>当前卦象</h3>
                    <div class="yao-container" id="yao-display"></div>
                    <div id="liuyao-result" class="subtle">尚未起卦，请点击上方按钮开始掷钱。</div>
                </div>
            </main>
        </div>

        <!-- View: History -->
        <div id="view-history" class="view">
            <header>
                <p class="date-info">历史记录</p>
                <h1 class="greeting">我的占卜日志</h1>
            </header>
            <main id="history-list">
                <div class="card-box">
                    <p class="subtle" style="text-align:center;">暂无记录，进行一次占卜后将显示在这里。</p>
                </div>
            </main>
        </div>

        <!-- View: Settings -->
        <div id="view-settings" class="view">
            <header>
                <p class="date-info">设置</p>
                <h1 class="greeting">系统配置</h1>
            </header>
            <main>
                <div class="card-box">
                    <h3>外观</h3>
                    <button class="btn-outline" onclick="toggleTheme()" style="width:100%; text-align:left;">
                        切换主题
                        <span id="theme-status" style="float:right;"></span>
                    </button>
                </div>
                <div class="card-box">
                    <h3>数据</h3>
                    <button class="btn-outline" onclick="clearAllData()" style="width:100%; text-align:left; color:var(--rose);">
                        清空所有数据 (不可恢复)
                    </button>
                </div>
            </main>
        </div>

        <!-- 抽牌桌 Overlay -->
        <div id="deal-overlay">
            <div class="deal-header">
                <h3 class="deal-title" id="deal-title">请静心思考，点击选牌</h3>
                <p class="deal-count" id="deal-count">已选择: 0/3</p>
            </div>
            <div id="deal-area"></div>
            <div class="deal-footer">
                <button class="btn-fill" onclick="confirmDeal()">确认解读</button>
                <button class="btn-outline" onclick="closeDealer()">取消</button>
            </div>
        </div>

        <!-- 答案之书 Modal -->
        <div id="book-modal" class="book-modal">
            <div class="book-cover">
                <h2 style="margin:0;">答案之书</h2>
                <p style="margin:5px 0 0 0; opacity:0.8;">第 <span id="book-page">1</span> 页</p>
            </div>
            <div class="book-content">
                <h3 id="book-title" style="margin-top:0; color:var(--gold);"></h3>
                <p id="book-text" style="line-height:1.8;"></p>
                <button class="book-close" onclick="closeBook()">关闭</button>
                <button class="btn-fill" onclick="openBook()" style="margin-top:10px; width:100%;">再翻一页</button>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav>
            <div class="nav-item active" onclick="switchView('home')">首页</div>
            <div class="nav-item" onclick="switchView('tarot')">塔罗</div>
            <div class="nav-item" onclick="switchView('liuyao')">六爻</div>
            <div class="nav-item" onclick="switchView('history')">记录</div>
            <div class="nav-item" onclick="switchView('settings')">更多</div>
        </nav>
    </div>

    <script>
        // ================= 数据库 =================
        // 塔罗牌数据 (精简版，实际应包含78张完整含义)
        const TAROT_DECK = [];
        const SUITS = ['权杖', '圣杯', '宝剑', '星币'];
        const MAJORS = [
            {name: '愚者', meaning: '新的开始、冒险、信任直觉、纯真'}, {name: '魔术师', meaning: '行动力、创造、显化、资源整合'},
            {name: '女祭司', meaning: '直觉、内在智慧、神秘、潜意识'}, {name: '女皇', meaning: '丰盛、滋养、创造力、母性'},
            {name: '皇帝', meaning: '权威、秩序、掌控、结构'}, {name: '教皇', meaning: '传统、规范、信念、指导'},
            {name: '恋人', meaning: '选择、联结、和谐、关系'}, {name: '战车', meaning: '意志、胜利、推进、克服障碍'},
            {name: '力量', meaning: '耐心、勇气、内在掌控、温柔'}, {name: '隐士', meaning: '独处、反思、内在指引、寻找真相'},
            {name: '命运之轮', meaning: '转机、周期、机会、命运'}, {name: '正义', meaning: '平衡、因果、公正、决策'},
            {name: '倒吊人', meaning: '等待、牺牲、换个角度、静止'}, {name: '死神', meaning: '结束、蜕变、彻底的改变、重生'},
            {name: '节制', meaning: '调和、适度、耐心、修复'}, {name: '恶魔', meaning: '执着、束缚、欲望、物质主义'},
            {name: '高塔', meaning: '突变、崩塌、觉醒、真相揭露'}, {name: '星星', meaning: '希望、疗愈、愿景、信心'},
            {name: '月亮', meaning: '潜意识、不安、幻象、迷惑'}, {name: '太阳', meaning: '成功、喜悦、清晰、活力'},
            {name: '审判', meaning: '觉醒、召唤、复盘、救赎'}, {name: '世界', meaning: '完成、圆满、整合、达成'}
        ];
        MAJORS.forEach(c => TAROT_DECK.push({type: 'major', ...c}));
        SUITS.forEach(suit => {
            ['一','二','三','四','五','六','七','八','九','十','侍从','骑士','王后','国王'].forEach((num, i) => {
                TAROT_DECK.push({type: 'minor', suit: suit, name: `${suit}${num}`, meaning: `${suit}的${num}，代表${suit}元素在${i+1}阶段的状态。`});
            });
        });

        // 64卦数据 (精简版，包含卦名和编码)
        const GUA_MAP = {
            "111111": {name:"乾为天", judgment:"元亨利贞，自强不息。"}, "000000": {name:"坤为地", judgment:"元亨，利牝马之贞。"},
            "100010": {name:"水雷屯", judgment:"元亨利贞，勿用有攸往。"}, "010001": {name:"山水蒙", judgment:"亨，匪我求童蒙。"},
            // ...此处为节省篇幅省略完整数据，实际项目中应补全...
        };
        // 自动补全缺失卦名
        const ALL_GUA_NAMES = ["乾为天","坤为地","水雷屯","山水蒙","水天需","天水讼","地水师","水地比","风天小畜","天泽履","地天泰","天地否","天火同人","火天大有","地山谦","雷地豫","泽雷随","山风蛊","地泽临","风地观","火雷噬嗑","山火贲","山地剥","地雷复","天雷无妄","山天大畜","山雷颐","泽风大过","坎为水","离为火","泽山咸","雷风恒","天山遁","雷天大壮","火地晋","地火明夷","风火家人","火泽睽","水山蹇","雷水解","山泽损","风雷益","泽天夬","天风姤","泽地萃","地风升","泽水困","水风井","泽火革","火风鼎","震为雷","艮为山","风山渐","雷泽归妹","雷火丰","火山旅","巽为风","兑为泽","风水涣","水泽节","风泽中孚","雷山小过","水火既济","火水未济"];
        const ALL_GUA_BIN = ["111111","000000","100010","010001","111010","010111","010000","000010","111011","110111","111000","000111","101111","111101","001000","000100","100110","011001","110000","000011","100101","101001","000001","100000","100111","111001","100001","011110","010010","101101","001110","011100","001111","111100","000101","101000","101011","110101","001010","010100","110001","100011","111110","011111","000110","011000","010110","011010","101110","011101","100100","001001","001011","110100","110101","101100","011011","110110","010011","110010","110011","001100","101010","010101"];
        ALL_GUA_NAMES.forEach((n,i) => { if(!GUA_MAP[ALL_GUA_BIN[i]]) GUA_MAP[ALL_GUA_BIN[i]] = {name:n, judgment:"卦辞待补充。"}; });

        // 答案之书内容
        const BOOK_CONTENT = [
            {title:"初心", text:"凡事开头难，但最关键的一步就是迈出第一步。不要担心结果，专注于当下的行动。"},
            {title:"耐心", text:"万事皆有定数，急于求成往往适得其反。保持耐心，等待花开。"},
            {title:"选择", text:"你现在的处境是你过去选择的结果。未来的路，掌握在你自己手中。"},
            {title:"放手", text:"有些东西，失去了才知道珍惜；有些东西，只有放手才能得到新的开始。"},
            {title:"信任", text:"相信你的直觉，它是你内在最真实的声音。不要让外界的噪音干扰你的判断。"},
            // ...可扩展至36条
        ];
        while(BOOK_CONTENT.length < 36) BOOK_CONTENT.push({title:"空白", text:"这一页是留给你自己书写的。你的命运由你自己定义。"});

        // ================= 状态管理 =================
        const State = {
            user: null,
            users: {},
            currentSpread: null,
            pickedCards: [],
            dealType: 'tarot',
            yaoLines: [],
            chatHistory: []
        };

        // ================= 工具函数 =================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        function saveState() {
            localStorage.setItem('spirit_altar_data', JSON.stringify({users: State.users, currentUser: State.user}));
        }

        function loadState() {
            const data = JSON.parse(localStorage.getItem('spirit_altar_data'));
            if(data && data.users) {
                State.users = data.users;
                State.user = data.currentUser;
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
        }

        function vibrate(t=10) { if(navigator.vibrate) navigator.vibrate(t); }

        // ================= 视图控制 =================
        function switchView(viewId) {
            $$('.view').forEach(v => v.classList.remove('active'));
            $('#view-'+viewId).classList.add('active');
            $$('.nav-item').forEach((n,i) => n.classList.toggle('active', ['home','tarot','liuyao','history','settings'][i] === viewId));
        }

        // ================= 用户系统 =================
        function login() {
            const name = $('#input-name').value.trim() || '访客';
            const pass = $('#input-pass').value; // 简单演示，不加密
            if(!State.users[name]) {
                State.users[name] = {pass: pass, history: [], stats: {count:0}};
            } else if(State.users[name].pass !== pass) {
                alert('密码错误');
                return;
            }
            State.user = name;
            saveState();
            refreshHome();
            switchView('home');
        }

        function logout() {
            State.user = null;
            saveState();
            switchView('login');
        }

        function refreshHome() {
            if(!State.user) return;
            const hours = new Date().getHours();
            let greet = '深夜好';
            if(hours < 12) greet = '早上好';
            else if(hours < 18) greet = '下午好';
            else if(hours < 23) greet = '晚上好';
            $('#home-greeting').innerText = `${greet}，${State.user}`;
            $('#home-date').innerText = new Date().toLocaleDateString('zh-CN', {weekday:'long', month:'long', day:'numeric'});
            $('#stat-count').innerText = State.users[State.user].stats.count;
        }

        // ================= 塔罗抽牌 =================
        function openDealer(type, spread) {
            State.dealType = type;
            State.currentSpread = spread;
            State.pickedCards = [];
            const countMap = {single:1, three:3, yesno:2, celtic:10, love:7, career:6, daily:3, weekly:5, monthly:7};
            State.maxPick = countMap[spread] || 3;
            $('#deal-title').innerText = `请静心思考，抽取 ${State.maxPick} 张牌`;
            $('#deal-count').innerText = `已选择: 0/${State.maxPick}`;
            $('#deal-area').innerHTML = '';
            $('#deal-overlay').style.display = 'flex';

            const total = TAROT_DECK.length;
            const radius = 220;
            const start = -50, end = 50;
            const step = (end - start) / (total - 1);

            for(let i=0; i<total; i++) {
                const angle = start + i * step;
                const card = document.createElement('div');
                card.className = 'deal-card';
                card.style.setProperty('--angle', `${angle}deg`);
                card.style.transform = `translateX(-50%) rotate(${angle}deg) translateY(-${radius}px)`;
                card.dataset.index = i;
                card.onclick = () => pickCard(card, i, angle);
                $('#deal-area').appendChild(card);
            }
        }

        function pickCard(el, idx, angle) {
            if(el.classList.contains('selected')) return;
            if(State.pickedCards.length >= State.maxPick) return;
            vibrate(5);
            el.classList.add('selected');
            State.pickedCards.push(idx);
            $('#deal-count').innerText = `已选择: ${State.pickedCards.length}/${State.maxPick}`;
            // 微动画
            el.style.transform = `translateX(-50%) rotate(${angle}deg) translateY(-260px) scale(1.1)`;
        }

        function closeDealer() {
            $('#deal-overlay').style.display = 'none';
        }

        function confirmDeal() {
            if(State.pickedCards.length < State.maxPick) {
                alert(`请选择 ${State.maxPick} 张牌`);
                return;
            }
            vibrate([50,50,50]);
            renderResult();
            saveHistory();
            closeDealer();
            switchView('home'); // 回到首页看结果或单独结果页，这里简单回首页
        }

        function renderResult() {
            // 简化版：直接在控制台或alert显示，实际项目需渲染到页面
            let msg = "解读结果：\n";
            const positions = ["过去","现在","未来","核心","阻碍","建议"];
            State.pickedCards.forEach((idx, i) => {
                const card = TAROT_DECK[idx];
                const reversed = Math.random() < 0.3;
                msg += `${positions[i]||`第${i+1}张`}: ${card.name} ${reversed?'逆位':'正位'} - ${card.meaning}\n`;
            });
            alert(msg);
        }

        // ================= 六爻逻辑 =================
        function startLiuyao() {
            State.yaoLines = [];
            $('#yao-display').innerHTML = '';
            $('#liuyao-result').innerText = '正在起卦中...';
            tossCoin();
        }

        function tossCoin() {
            if(State.yaoLines.length >= 6) return renderLiuyaoResult();
            // 3枚铜钱
            const coins = [Math.round(Math.random()), Math.round(Math.random()), Math.round(Math.random())];
            const sum = coins.reduce((a,b)=>a+b,0);
            let type;
            if(sum === 3) type = {cls:'yang', mark:'○'}; // 老阳
            else if(sum === 0) type = {cls:'yin', mark:'×'}; // 老阴
            else if(sum === 2) type = {cls:'yin', mark:''}; // 少阴
            else type = {cls:'yang', mark:''}; // 少阳
            
            State.yaoLines.push(type);
            renderYaoLine(type);
            
            setTimeout(tossCoin, 300); // 模拟掷钱间隔
        }

        function renderYaoLine(type) {
            const div = document.createElement('div');
            div.className = `yao ${type.cls}`;
            if(type.mark) {
                const span = document.createElement('span');
                span.className = 'yao-mark';
                span.innerText = type.mark;
                div.appendChild(span);
            }
            $('#yao-display').appendChild(div);
        }

        function renderLiuyaoResult() {
            const bits = State.yaoLines.map(l => l.cls === 'yang' ? '1' : '0').join('');
            const gua = GUA_MAP[bits] || {name:'未知卦', judgment:'无'};
            const question = $('#liuyao-question').value;
            $('#liuyao-result').innerHTML = `
                <strong>${gua.name}</strong> (${bits})<br>
                <em>${gua.judgment}</em>
                ${question ? `<br><br>针对“${question}”：${gua.judgment}` : ''}
            `;
        }

        // ================= 答案之书 =================
        function openBook() {
            const idx = Math.floor(Math.random() * BOOK_CONTENT.length);
            const content = BOOK_CONTENT[idx];
            $('#book-page').innerText = idx + 1;
            $('#book-title').innerText = content.title;
            $('#book-text').innerText = content.text;
            $('#book-modal').classList.add('show');
        }

        function closeBook() {
            $('#book-modal').classList.remove('show');
        }

        // ================= 历史记录 =================
        function saveHistory() {
            if(!State.user) return;
            const user = State.users[State.user];
            const record = {
                time: new Date().toLocaleString(),
                type: State.currentSpread,
                cards: State.pickedCards.map(i => TAROT_DECK[i].name)
            };
            user.history.unshift(record);
            user.stats.count++;
            saveState();
            renderHistory();
        }

        function renderHistory() {
            if(!State.user) return;
            const list = State.users[State.user].history;
            const el = $('#history-list');
            if(list.length === 0) {
                el.innerHTML = '<div class="card-box"><p class="subtle" style="text-align:center;">暂无记录</p></div>';
                return;
            }
            el.innerHTML = list.slice(0, 20).map(r => `
                <div class="card-box">
                    <div class="subtle">${r.time}</div>
                    <strong>${r.type}</strong><br>
                    <div style="margin-top:5px;">${r.cards.join(' | ')}</div>
                </div>
            `).join('');
        }

        // ================= 设置 =================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            $('#theme-status').innerText = document.body.classList.contains('dark-mode') ? '深色' : '浅色';
        }

        function clearAllData() {
            if(confirm('确定要清空所有数据吗？')) {
                localStorage.clear();
                location.reload();
            }
        }

        // ================= 初始化 =================
        loadState();
        if(State.user) {
            refreshHome();
            switchView('home');
        } else {
            switchView('login');
        }
    </script>
</body>
</html>
